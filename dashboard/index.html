<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期货交易看板</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #000000; --bg2: #0a0a0a; --bg3: #111111; --border: #2a2a2a;
  --text: #e6edf3; --muted: #7d8590; --accent: #58a6ff;
  --bull: #ef5350; --bear: #26a69a;
}
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

#header { display: flex; align-items: center; gap: 12px; padding: 0 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; height: 48px; }
#header .contract { font-size: 15px; font-weight: 700; }
#header .price { font-size: 20px; font-weight: 700; }
#header .chg { font-size: 12px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.chg.up { background: rgba(239,83,80,.15); color: var(--bull); }
.chg.dn { background: rgba(38,166,154,.15); color: var(--bear); }
.sep { width: 1px; height: 24px; background: var(--border); flex-shrink:0; }
.ts { color: var(--muted); font-size: 12px; }
.spacer { flex: 1; }
.period-btns { display: flex; gap: 4px; }
.period-btn { padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 500; transition: all .15s; }
.period-btn:hover { border-color: var(--accent); color: var(--accent); }
.period-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.icon-btn { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all .15s; }
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
@keyframes spin { to { transform: rotate(360deg); } }

#main { display: flex; flex: 1; overflow: hidden; }

#sidebar { width: 240px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.s-card { padding: 12px 14px; border-bottom: 1px solid var(--border); }
.s-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
.signal-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.signal-badge.long { background: rgba(239,83,80,.18); color: var(--bull); }
.signal-badge.exit { background: rgba(38,166,154,.18); color: var(--bear); }
.signal-badge.wait { background: rgba(125,133,144,.12); color: var(--muted); }
.sub-sigs { display: flex; flex-direction: column; gap: 5px; }
.sub-sig { display: flex; justify-content: space-between; align-items: center; }
.sub-sig .lbl { color: var(--muted); font-size: 12px; }
.sub-sig .val { font-size: 12px; font-weight: 600; }
.val.on { color: #4caf50; }
.val.off { color: var(--muted); }
.metric-row { display: flex; justify-content: space-between; margin-bottom: 7px; }
.metric-row .lbl { color: var(--muted); }
.metric-row .val { font-weight: 600; }
.val.bull { color: var(--bull); }
.val.bear { color: var(--bear); }
.level-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
.level-row.cur { background: rgba(88,166,255,.1); border-radius: 4px; padding: 4px 6px; }
.level-row .lv-name { color: var(--muted); }
.level-row .lv-val { font-weight: 600; font-family: monospace; }
.hist-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(48,54,61,.5); font-size: 12px; }
.hist-item:last-child { border: none; }
.hist-long  { color: #FFD700; font-weight: 700; }
.hist-short { color: #00CC00; font-weight: 700; }

/* 自选股面板 */
.wl-search-wrap { position: relative; margin-bottom: 8px; }
.wl-search { width: 100%; background: #111; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 10px; outline: none; transition: border-color .15s; }
.wl-search:focus { border-color: var(--accent); }
.wl-search::placeholder { color: var(--muted); }
.wl-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #1a1a1a; border: 1px solid var(--border); border-radius: 6px; z-index: 200; max-height: 220px; overflow-y: auto; display: none; box-shadow: 0 8px 24px rgba(0,0,0,.6); }
.wl-dropdown.open { display: block; }
.wl-drop-item { padding: 7px 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 12px; transition: background .1s; }
.wl-drop-item:hover { background: rgba(88,166,255,.12); }
.wl-drop-item .di-name { color: var(--text); font-weight: 600; }
.wl-drop-item .di-meta { color: var(--muted); font-size: 11px; }
.wl-drop-searching { padding: 10px; color: var(--muted); font-size: 12px; text-align: center; }
.wl-add-row { display: flex; gap: 6px; margin-top: 6px; }
.wl-add-input { flex: 1; background: #111; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 5px 8px; outline: none; }
.wl-add-input:focus { border-color: var(--accent); }
.wl-add-btn { padding: 5px 10px; background: var(--accent); border: none; border-radius: 6px; color: #fff; font-size: 12px; cursor: pointer; white-space: nowrap; }
.wl-add-btn:hover { opacity: .85; }
.watchlist-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 6px; border-radius: 5px; cursor: pointer; transition: background .12s; }
.watchlist-item:hover { background: rgba(88,166,255,.08); }
.watchlist-item.active { background: rgba(88,166,255,.16); }
.watchlist-item .wl-name { font-size: 13px; font-weight: 600; color: var(--text); }
.watchlist-item .wl-code { font-size: 11px; color: var(--muted); }
.watchlist-item .wl-del { font-size: 14px; color: var(--muted); padding: 0 2px; line-height: 1; opacity: 0; transition: opacity .12s; }
.watchlist-item:hover .wl-del { opacity: 1; }
.watchlist-item .wl-del:hover { color: #ef5350; }

#charts-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.chart-wrap { position: relative; overflow: hidden; }
.chart-wrap + .chart-wrap { border-top: 1px solid var(--border); }
.chart-label { position: absolute; top: 6px; left: 10px; z-index: 10; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; pointer-events: none; }
.chart-legend { position: absolute; top: 6px; left: 60px; z-index: 10; font-size: 11px; color: var(--text); pointer-events: none; display: flex; gap: 10px; flex-wrap: wrap; }
.resizer { height: 5px; background: var(--border); cursor: ns-resize; flex-shrink: 0; transition: background .15s; }
.resizer:hover { background: var(--accent); }
#loading { position: absolute; inset: 0; background: rgba(13,17,23,.88); display: flex; align-items: center; justify-content: center; z-index: 100; font-size: 14px; color: var(--muted); flex-direction: column; gap: 8px; }
#loading.hidden { display: none; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
body.fullscreen #sidebar { display: none; }

/* 波段王 canvas overlay */
.bsd-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }

/* 弹窗堆叠容器 */
#popup-stack {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column; gap: 10px;
  z-index: 9999; pointer-events: none; width: 500px;
}
/* 信号弹窗 */
.signal-alert {
  background: #0a0a18; border-radius: 20px;
  padding: 32px 52px 20px; text-align: center; pointer-events: all;
  animation: sig-shake 0.25s linear infinite;
}
.signal-alert.long  { border: 3px solid var(--bull); box-shadow: 0 0 60px rgba(239,83,80,.6), 0 0 120px rgba(239,83,80,.25), 0 8px 40px rgba(0,0,0,.9); }
.signal-alert.short { border: 3px solid var(--bear); box-shadow: 0 0 60px rgba(38,166,154,.6), 0 0 120px rgba(38,166,154,.25), 0 8px 40px rgba(0,0,0,.9); }
.signal-alert-icon { font-size: 46px; margin-bottom: 8px; }
.signal-alert-type { font-size: 28px; font-weight: 800; margin-bottom: 10px; letter-spacing: 4px; }
.signal-alert-info { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 2; }
.sig-remain { color: var(--text); font-weight: 600; }
.signal-alert-actions { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; }
.signal-alert-goto {
  padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border);
  font-size: 12px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text); transition: all .15s;
}
.signal-alert-goto:hover { border-color: var(--accent); color: var(--accent); }
.signal-alert-close { padding: 8px 20px; border-radius: 8px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; }
.signal-alert.long  .signal-alert-close { background: var(--bull); color: #fff; }
.signal-alert.short .signal-alert-close { background: var(--bear); color: #fff; }
/* 倒计时进度条 */
.signal-progress { height: 5px; background: rgba(255,255,255,.1); border-radius: 3px; overflow: hidden; }
.signal-progress-bar { height: 100%; width: 100%; border-radius: 3px; transition: width 1s linear; }
.signal-alert.long  .signal-progress-bar { background: #FFD700; }
.signal-alert.short .signal-progress-bar { background: #26a69a; }
/* 铃铛未读徽章 */
#bell-badge { position: absolute; top: 3px; right: 3px; min-width: 16px; height: 16px; padding: 0 3px; background: #ef5350; border-radius: 8px; font-size: 10px; color: #fff; font-weight: 700; display: none; align-items: center; justify-content: center; pointer-events: none; }
/* 未读信号面板 */
#unread-panel { display: none; position: fixed; top: 56px; right: 16px; width: 340px; background: #111; border: 1px solid #2a2a2a; border-radius: 10px; z-index: 1000; max-height: 400px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,.7); }
.unread-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid #1e1e1e; font-size: 12px; cursor: pointer; transition: background .12s; }
.unread-item:last-child { border: none; }
.unread-item:hover { background: rgba(88,166,255,.08); }
.unread-sig-long  { color: var(--bull); font-weight: 700; }
.unread-sig-short { color: var(--bear); font-weight: 700; }
/* 自选品种状态圆点 */
.wl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-right: 2px; }
.wl-dot.long    { background: var(--bull); box-shadow: 0 0 4px rgba(239,83,80,.8); }
.wl-dot.short   { background: var(--bear); box-shadow: 0 0 4px rgba(38,166,154,.8); }
.wl-dot.expired { background: #444; }
.wl-dot.none    { background: transparent; }
/* 过期历史条目 */
.hist-expired { opacity: .4; text-decoration: line-through; }
.hist-expired-tag { font-size: 10px; color: #555; }
@keyframes sig-shake {
  0%, 100% { transform: translateX(0); }
  20%       { transform: translateX(-14px); }
  40%       { transform: translateX(14px); }
  60%       { transform: translateX(-10px); }
  80%       { transform: translateX(10px); }
}
@keyframes sig-shake-counter {
  0%, 100% { transform: translateX(0); }
  20%       { transform: translateX(14px); }
  40%       { transform: translateX(-14px); }
  60%       { transform: translateX(10px); }
  80%       { transform: translateX(-10px); }
}
.signal-alert-inner { animation: sig-shake-counter 0.25s linear infinite; }
/* 多周期趋势面板 */
.trend-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 12px; border-bottom: 1px solid rgba(48,54,61,.4); }
.trend-row:last-child { border: none; }
.trend-period { color: var(--muted); min-width: 40px; }
.trend-status { font-weight: 700; font-size: 11px; flex: 1; padding-left: 6px; }
.trend-status.bull    { color: var(--bull); }
.trend-status.bear    { color: var(--bear); }
.trend-status.wait    { color: #FFD700; }
.trend-status.unknown { color: var(--muted); }
.trend-kd { color: var(--muted); font-size: 10px; font-family: monospace; }
.trend-resonance { padding: 5px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-align: center; margin-bottom: 8px; }
.trend-resonance.bull  { background: rgba(239,83,80,.18);  color: var(--bull); }
.trend-resonance.bear  { background: rgba(38,166,154,.18); color: var(--bear); }
.trend-resonance.mixed { background: rgba(255,193,7,.12);  color: #FFC107; }
/* 弹窗周期选择器 */
.alert-period-wrap { position: relative; }
.alert-period-dropdown { position: absolute; top: calc(100% + 4px); right: 0; width: 160px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 6px; z-index: 300; display: none; box-shadow: 0 8px 24px rgba(0,0,0,.6); }
.alert-period-dropdown.up { top: auto; bottom: calc(100% + 4px); }
.alert-period-dropdown.open { display: block; }
.alert-period-item { padding: 7px 10px; cursor: pointer; font-size: 12px; display: flex; justify-content: space-between; align-items: center; transition: background .1s; }
.alert-period-item:hover { background: rgba(88,166,255,.12); }
.alert-period-item.active { color: var(--accent); font-weight: 600; }
.alert-period-item input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }
/* 共振弹窗 */
.signal-alert.resonance.long  { border-color: #FF6600; box-shadow: 0 0 80px rgba(255,102,0,.7), 0 0 150px rgba(255,102,0,.3), 0 8px 40px rgba(0,0,0,.9); }
.signal-alert.resonance.short { border-color: #00FFAA; box-shadow: 0 0 80px rgba(0,255,170,.7), 0 0 150px rgba(0,255,170,.3), 0 8px 40px rgba(0,0,0,.9); }
/* 周期标签 */
.period-tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 600; background: rgba(88,166,255,.18); color: var(--accent); margin-left: 4px; vertical-align: middle; }
/* 实时时钟 */
#hdr-clock { color: #888888; font-size: 12px; flex-shrink: 0; font-family: monospace; }
/* 交易状态灯 */
#market-status { display: flex; align-items: center; gap: 4px; font-size: 12px; flex-shrink: 0; }
#ms-emoji { font-size: 11px; line-height: 1; }
/* 侧边栏滚动条 — 贴近面板色调，与右边缘对齐 */
#sidebar ::-webkit-scrollbar { width: 4px; }
#sidebar ::-webkit-scrollbar-track { background: transparent; }
#sidebar ::-webkit-scrollbar-thumb { background: rgba(125,133,144,.25); border-radius: 2px; }
#sidebar ::-webkit-scrollbar-thumb:hover { background: rgba(125,133,144,.5); }
</style>
</head>
<body>

<div id="header">
  <span id="hdr-name" class="contract">期货看板</span>
  <span id="hdr-contract" style="color:var(--muted);font-size:12px">P2609</span>
  <div id="market-status"><span id="ms-emoji">⚫</span><span id="ms-text" style="color:var(--muted)">--</span></div>
  <div class="sep"></div>
  <span id="hdr-price" class="price" style="color:var(--bull)">--</span>
  <span id="hdr-chg" class="chg up">--</span>
  <div class="spacer"></div>
  <div class="period-btns">
    <button class="period-btn" data-p="1">1分</button>
    <button class="period-btn" data-p="5">5分</button>
    <button class="period-btn" data-p="15">15分</button>
    <button class="period-btn active" data-p="30">30分</button>
    <button class="period-btn" data-p="60">60分</button>
    <button class="period-btn" data-p="120">120分</button>
    <button class="period-btn" data-p="daily">日线</button>
    <button class="period-btn" data-p="weekly">周线</button>
  </div>
  <button class="icon-btn" id="btn-bell" title="未读信号" style="position:relative">🔔<span id="bell-badge"></span></button>
  <button class="icon-btn" id="btn-refresh" title="刷新">⟳</button>
  <button class="icon-btn" id="btn-fs" title="全屏/还原">⛶</button>
  <div class="sep"></div>
  <span id="hdr-clock"></span>
</div>

<!-- 导入公式模态框 -->
<div id="modal-import" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#111;border:1px solid #2a2a2a;border-radius:10px;width:560px;max-width:95vw;padding:24px;display:flex;flex-direction:column;gap:14px;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:15px;font-weight:700;">导入慧赢公式</span>
      <button id="modal-close" style="background:none;border:none;color:#7d8590;font-size:20px;cursor:pointer;line-height:1;">×</button>
    </div>
    <div style="display:flex;gap:10px;">
      <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
        <label style="font-size:11px;color:#7d8590;">指标名称</label>
        <input id="fi-name" placeholder="如：JLHB绝路航标" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;color:#e6edf3;font-size:13px;padding:7px 10px;outline:none;">
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <label style="font-size:11px;color:#7d8590;">位置</label>
        <select id="fi-panel" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;color:#e6edf3;font-size:13px;padding:7px 10px;outline:none;">
          <option value="sub">副图</option>
          <option value="main">主图</option>
        </select>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;">
      <label style="font-size:11px;color:#7d8590;">TDX 公式代码</label>
      <textarea id="fi-source" rows="12" placeholder="粘贴慧赢/通达信公式…" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;color:#e6edf3;font-size:12px;font-family:monospace;padding:10px;outline:none;resize:vertical;line-height:1.5;"></textarea>
    </div>
    <div id="fi-error" style="color:#ef5350;font-size:12px;display:none;"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button id="fi-cancel" style="padding:8px 18px;background:transparent;border:1px solid #2a2a2a;border-radius:6px;color:#7d8590;cursor:pointer;font-size:13px;">取消</button>
      <button id="fi-submit" style="padding:8px 18px;background:#58a6ff;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:13px;font-weight:600;">解析并添加</button>
    </div>
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <!-- 搜索+添加区域 (固定60px) -->
    <div style="flex-shrink:0; height:60px; overflow:hidden; padding:8px 12px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; justify-content:center;">
      <div class="wl-search-wrap" style="margin-bottom:0;">
        <input id="wl-search" class="wl-search" placeholder="搜索或输入合约代码添加…" autocomplete="off">
        <div id="wl-dropdown" class="wl-dropdown"></div>
      </div>
      <!-- 隐藏的添加控件，供 JS 引用 -->
      <div class="wl-add-row" style="display:none;">
        <input id="wl-add-input" class="wl-add-input" placeholder="如 RB2510" autocomplete="off">
        <button id="wl-add-btn" class="wl-add-btn">+ 添加</button>
      </div>
    </div>

    <!-- 自选列表 (flex:1，内部滚动) -->
    <div style="flex:1; overflow-y:auto; padding:6px 0 6px 10px; border-bottom:1px solid var(--border); min-height:0;">
      <div id="watchlist"></div>
    </div>

    <!-- 当前信号状态 (固定80px) -->
    <div style="flex-shrink:0; height:80px; overflow:hidden; padding:6px 12px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; justify-content:center; gap:4px;">
      <div id="sig-badge" class="signal-badge wait" style="margin-bottom:0;">◉ 等待信号</div>
      <div style="display:flex;flex-direction:column;gap:3px;">
        <div id="status-po"   style="padding:3px 8px;border-radius:6px;background:rgba(125,133,144,.1);font-size:11px;color:var(--muted);transition:all .2s;">🟡 黄点破浪：未触发</div>
        <div id="status-kong" style="padding:3px 8px;border-radius:6px;background:rgba(125,133,144,.1);font-size:11px;color:var(--muted);transition:all .2s;">🟢 绿点空仓：未触发</div>
      </div>
    </div>

    <!-- 历史信号 (固定120px) -->
    <div style="flex-shrink:0; height:120px; overflow:hidden; padding:6px 0 6px 12px; border-bottom:1px solid var(--border); display:flex; flex-direction:column;">
      <div class="s-title" style="margin-bottom:4px;">📋 历史信号</div>
      <div id="hist-list" style="flex:1; overflow-y:auto; min-height:0;"></div>
    </div>

    <!-- 多周期趋势 (固定180px) -->
    <div style="flex-shrink:0; height:180px; overflow:hidden; padding:8px 12px; border-bottom:1px solid var(--border); display:flex; flex-direction:column;">
      <div class="s-title" style="margin-bottom:6px;">📊 多周期趋势</div>
      <div id="trend-resonance-msg" style="display:none"></div>

<script>
const API = '/api/data';
// 弹窗状态（必须在 renderWatchlist / updateSidebar 之前声明）
const _activePopups  = {};
const _unreadSignals = [];
const _symbolStatus  = {};
const _expiredKeys   = new Set();
let currentPeriod = '30';
let currentSymbol = 'P0';
let currentSymbolName = '棕榈油主力';
let allData = null;
let kChart, bsdChart;
let candleSeries, volSeries, supportSeries, markerSeries;
let maSeries = {};
let bsdBaseSeries;
// 动态副图：{ id, chart, canvas, meta }
let subCharts = [];
let extremeLine10, extremeLine90;
let activePriceLines = [];
let viewInitialized = false;

// 页面会话开始时间（ISO字符串），用于过滤本次连接之前产生的历史信号
const _sessionStart = new Date().toLocaleString('sv').replace('T', ' ');

// ── 实时时钟 ──────────────────────────────────────────
(function startClock() {
  function tick() {
    const now = new Date();
    const el = document.getElementById('hdr-clock');
    if (el) el.textContent = now.toLocaleString('zh-CN', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
  }
  tick();
  setInterval(tick, 1000);
})();

// ── 交易状态灯 ──────────────────────────────────────────
function updateMarketStatus() {
  fetch(`/api/market_status?symbol=${encodeURIComponent(currentSymbol)}`)
    .then(r => r.json())
    .then(s => {
      const emoji = document.getElementById('ms-emoji');
      const text  = document.getElementById('ms-text');
      if (!emoji || !text) return;
      if (s.status === 'trading') {
        emoji.textContent = '🟢';
        text.textContent  = '交易中';
        text.style.color  = '#4caf50';
      } else if (s.status === 'lunch') {
        emoji.textContent = '🟡';
        text.textContent  = `午休中 | ${s.next_open} 恢复`;
        text.style.color  = '#FFD700';
      } else {
        emoji.textContent = '⚫';
        text.textContent  = `已闭市 | ${s.next_open} 开市`;
        text.style.color  = 'var(--muted)';
      }
    })
    .catch(() => {});
}
updateMarketStatus();
setInterval(updateMarketStatus, 60000);

// 将 lightweight-charts Unix秒时间戳格式化为可读字符串
function fmtBarTime(t) {
  const d = new Date(t * 1000);
  const y = d.getFullYear();
  const M = String(d.getMonth() + 1).padStart(2, '0');
  const D = String(d.getDate()).padStart(2, '0');
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  return (currentPeriod === 'daily' || currentPeriod === 'weekly')
    ? `${y}-${M}-${D}`
    : `${y}-${M}-${D} ${h}:${m}`;
}

// 更新 K线图内左上角 OHLC + 时间（不传 bar 时读末根 K 线）
function updateKlineLegend(bar) {
  const el = document.getElementById('legend-kline');
  if (!el) return;
  if (!bar && allData && allData.indicator_series?.length) {
    bar = allData.indicator_series[allData.indicator_series.length - 1];
  }
  if (!bar) return;
  const d = new Date(bar.time * 1000);
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const dy = String(d.getDate()).padStart(2, '0');
  const h = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  const s = String(d.getSeconds()).padStart(2, '0');
  const timeStr = (currentPeriod === 'daily' || currentPeriod === 'weekly')
    ? `${y}-${mo}-${dy}` : `${y}-${mo}-${dy} ${h}:${mi}:${s}`;
  el.innerHTML =
    `<span style="color:#b0bec5">O <b>${bar.open?.toFixed(0)}</b></span>` +
    `<span style="color:#ef5350">H <b>${bar.high?.toFixed(0)}</b></span>` +
    `<span style="color:#26a69a">L <b>${bar.low?.toFixed(0)}</b></span>` +
    `<span style="color:#e6edf3">C <b>${bar.close?.toFixed(0)}</b></span>` +
    `<span style="color:#7d8590"> | ${timeStr}</span>`;
}

// ── 多周期配置 ────────────────────────────────────────
const ALERT_PERIOD_DURATIONS = { '5':3, '15':8, '30':15, '60':30, '120':60, 'daily':240, 'weekly':1440 }; // 分钟
const ALERT_PERIOD_LABELS    = { '5':'5分', '15':'15分', '30':'30分', '60':'60分', '120':'120分', 'daily':'日线', 'weekly':'周线' };
const SCAN_INTERVALS_MS      = { '5':2*60000, '15':5*60000, '30':5*60000, '60':15*60000, '120':30*60000, 'daily':Infinity, 'weekly':Infinity };
const _lastScanTime = {}; // 'symbol|period' -> timestamp

const COMMON = {
  layout: { background: { color: '#000000' }, textColor: '#888888' },
  grid: { vertLines: { color: '#111111' }, horzLines: { color: '#111111' } },
  crosshair: {
    mode: LightweightCharts.CrosshairMode.Normal,
    vertLine: { color: '#58a6ff44', width: 1, style: 1 },
    horzLine: { color: '#58a6ff44', width: 1, style: 1 }
  },
  rightPriceScale: { borderColor: '#30363d' },
  timeScale: {
    borderColor: '#30363d',
    timeVisible: true,
    secondsVisible: false,
    rightOffset: 3,
    barSpacing: 12,
    minBarSpacing: 2,
  },
};

function h(id) { return document.getElementById(id).clientHeight; }
function w(id) { return document.getElementById(id).clientWidth;  }

function initCharts() {
  const cw = document.getElementById('charts-area').clientWidth;

  // ── 主图 ──────────────────────────────────────────
  kChart = LightweightCharts.createChart('chart-kline', {
    ...COMMON, width: cw, height: h('wrap-kline'),
  });

  // K线：慧赢配色 — 阳线红色，阴线白色
  candleSeries = kChart.addCandlestickSeries({
    upColor: '#ef5350',   downColor: '#ffffff',
    borderUpColor: '#ef5350', borderDownColor: '#cccccc',
    wickUpColor:   '#ef5350', wickDownColor:   '#cccccc',
  });

  // 成交量
  volSeries = kChart.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol',
  });
  kChart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });

  // 支撑线：慧赢蓝色，线宽2
  supportSeries = kChart.addLineSeries({
    color: '#00AAFF', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Solid,
    lastValueVisible: false, priceLineVisible: false, title: '支撑',
  });

  // M1~M5：粗细递增（1~3px），下降黄/上升粉，与慧赢带状视觉一致
  const maWidths = { M1: 1, M2: 1, M3: 2, M4: 2, M5: 3 };
  ['M1','M2','M3','M4','M5'].forEach(name => {
    maSeries[name] = kChart.addLineSeries({
      color: '#FFD700', lineWidth: maWidths[name],
      lastValueVisible: false, priceLineVisible: false, title: name,
    });
  });

  // 信号标记专用 series — 最后添加确保渲染在所有线条之上
  markerSeries = kChart.addLineSeries({
    color: 'transparent', lineWidth: 0,
    lastValueVisible: false, priceLineVisible: false,
  });

  // ── 波段王副图 ────────────────────────────────────
  bsdChart = LightweightCharts.createChart('chart-bsd', {
    ...COMMON, width: cw, height: h('wrap-bsd'),
    rightPriceScale: { borderColor: '#30363d', scaleMargins: { top: 0.02, bottom: 0.02 } },
  });

  // 用一条透明线固定纵轴范围 0~100
  bsdBaseSeries = bsdChart.addLineSeries({
    color: 'transparent', lineWidth: 0,
    lastValueVisible: false, priceLineVisible: false,
  });

  // 极端顶部线90：黄色实线（慧赢截图可见），底部线10不显示
  extremeLine10 = bsdChart.addLineSeries({
    color: 'transparent', lineWidth: 0,
    lastValueVisible: false, priceLineVisible: false,
  });
  extremeLine90 = bsdChart.addLineSeries({
    color: '#FFD700', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Solid,
    lastValueVisible: false, priceLineVisible: false,
  });

  syncCharts();
  setupLegends();
  initResizers();
}

// ── 时间轴联动（动态，支持任意数量图表）────────────────
let _syncing = false;
function getAllCharts() {
  return [kChart, bsdChart, ...subCharts.map(s => s.chart)].filter(Boolean);
}

function syncOneChart(src) {
  src.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (_syncing || !range) return;
    _syncing = true;
    getAllCharts().filter(c => c !== src).forEach(c => c.timeScale().setVisibleLogicalRange(range));
    if (allData) requestAnimationFrame(() => {
      drawBsdCanvas(allData.indicator_series);
      subCharts.forEach(s => { if (s.canvas) drawSubCanvas(s, allData.indicator_series); });
    });
    _syncing = false;
  });
}

function syncCharts() {
  syncOneChart(kChart);
  syncOneChart(bsdChart);
}


// ── 动态添加副图 ──────────────────────────────────────
function addSubChart(pluginMeta, bars) {
  const chartsArea = document.getElementById('charts-area');
  const cw = chartsArea.clientWidth;
  const id = pluginMeta.id;

  // 避免重复添加
  if (subCharts.find(s => s.id === id)) return;

  // 分隔条
  const resizer = document.createElement('div');
  resizer.className = 'resizer';

  // 图表容器
  const wrap = document.createElement('div');
  wrap.id = `wrap-sub-${id}`;
  wrap.className = 'chart-wrap';
  wrap.style.height = '22%';

  const label = document.createElement('div');
  label.className = 'chart-label';
  label.textContent = pluginMeta.name;

  const legend = document.createElement('div');
  legend.className = 'chart-legend';
  legend.id = `legend-sub-${id}`;

  const chartDiv = document.createElement('div');
  chartDiv.id = `chart-sub-${id}`;
  chartDiv.style.cssText = 'width:100%;height:100%';

  wrap.appendChild(label);
  wrap.appendChild(legend);
  wrap.appendChild(chartDiv);
  chartsArea.appendChild(resizer);
  chartsArea.appendChild(wrap);

  // 创建 chart
  const chart = LightweightCharts.createChart(chartDiv, {
    ...COMMON, width: cw, height: wrap.clientHeight,
  });

  // 固定纵轴（如果有 range 设置）
  const baseSeries = chart.addLineSeries({
    color: 'transparent', lineWidth: 0,
    lastValueVisible: false, priceLineVisible: false,
  });

  // hlines（水平参考线）
  const hlineSeries = (pluginMeta.hlines || []).map(hl =>
    chart.addLineSeries({
      color: hl.color || '#888', lineWidth: hl.width || 1,
      lastValueVisible: false, priceLineVisible: false,
    })
  );

  // 输出线 series（type=line 的）
  const lineSeries = {};
  (pluginMeta.outputs || []).filter(o => o.type === 'line').forEach(o => {
    lineSeries[o.col] = chart.addLineSeries({
      color: o.color || '#ffffff', lineWidth: o.width || 1,
      lastValueVisible: false, priceLineVisible: false,
    });
  });

  // stickline 用 canvas
  const hasStick = (pluginMeta.outputs || []).some(o => o.type === 'stickline');
  let canvas = null;
  if (hasStick) {
    canvas = document.createElement('canvas');
    canvas.className = 'bsd-canvas';
    wrap.appendChild(canvas);
  }

  const entry = { id, chart, wrap, baseSeries, hlineSeries, lineSeries, canvas, meta: pluginMeta };
  subCharts.push(entry);

  // 同步时间轴
  syncOneChart(chart);

  // 设置分隔条拖拽
  const prevWrap = resizer.previousElementSibling;
  setupResizer(resizer, prevWrap, wrap, getAllCharts()[getAllCharts().indexOf(chart) - 1], chart);

  // 渲染数据
  if (bars) renderSubChart(entry, bars);

  // window resize
  window.addEventListener('resize', () => {
    const cw2 = chartsArea.clientWidth;
    chart.resize(cw2, wrap.clientHeight);
    if (allData) drawSubCanvas(entry, allData.indicator_series);
  });
}

function renderSubChart(entry, bars) {
  const { chart, baseSeries, hlineSeries, lineSeries, canvas, meta } = entry;
  if (!bars || !bars.length) return;

  // 固定纵轴
  const range = meta.range;
  if (range) {
    baseSeries.setData([
      { time: bars[0].time, value: range[0] },
      { time: bars[bars.length - 1].time, value: range[1] },
    ]);
  } else {
    baseSeries.setData([
      { time: bars[0].time,              value: 0 },
      { time: bars[bars.length - 1].time, value: 0 },
    ]);
  }

  // hlines
  (meta.hlines || []).forEach((hl, i) => {
    hlineSeries[i]?.setData(bars.map(b => ({ time: b.time, value: hl.value })));
  });

  // 折线
  Object.entries(lineSeries).forEach(([col, series]) => {
    const out = (meta.outputs || []).find(o => o.col === col && o.type === 'line');
    const pts = bars.filter(b => b[col] != null).map(b => ({
      time: b.time, value: b[col],
      color: out?.color_rising ? (b[col + 'r'] ? out.color_rising : out.color) : out?.color,
    }));
    series.setData(pts);
  });

  // stickline canvas
  if (canvas) drawSubCanvas(entry, bars);
}

function drawSubCanvas(entry, bars) {
  const { canvas, chart, baseSeries, meta } = entry;
  if (!canvas) return;
  const wrap = entry.wrap;
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const stickOut = (meta.outputs || []).find(o => o.type === 'stickline');
  if (!stickOut) return;

  const col1 = stickOut.col;
  const col2 = stickOut.col2;
  const valid = bars.filter(b => b[col1] != null && b[col2] != null);
  if (valid.length < 2) return;

  const ts = chart.timeScale();
  const x0 = ts.timeToCoordinate(valid[0].time);
  const x1 = ts.timeToCoordinate(valid[1].time);
  const barPx = (x0 != null && x1 != null) ? Math.abs(x1 - x0) : 8;
  const hw = Math.max(2, barPx * 0.48);

  for (const b of valid) {
    const x  = ts.timeToCoordinate(b.time);
    if (x == null) continue;
    const yK = baseSeries.priceToCoordinate(b[col1]);
    const yD = baseSeries.priceToCoordinate(b[col2]);
    if (yK == null || yD == null) continue;
    const top = Math.min(yK, yD);
    const ht  = Math.max(2, Math.abs(yK - yD));
    const bull = b[col1] >= b[col2];
    ctx.fillStyle = bull ? (stickOut.color_bull || '#CC0000') : (stickOut.color_bear || '#00AA00');
    ctx.fillRect(x - hw, top, hw * 2, ht);
    ctx.fillStyle = bull ? 'rgba(255,60,60,0.35)' : 'rgba(0,200,0,0.35)';
    ctx.fillRect(x - hw - 1, top, hw * 2 + 2, ht);
  }
}

// ── Legend ───────────────────────────────────────────
function setupLegends() {
  kChart.subscribeCrosshairMove(p => {
    if (!p.time) {
      updateKlineLegend();  // 恢复末根K线 OHLC + 时间
      return;
    }
    const d = p.seriesData.get(candleSeries);
    if (!d) return;
    updateKlineLegend({ open: d.open, high: d.high, low: d.low, close: d.close, time: p.time });
  });

  bsdChart.subscribeCrosshairMove(p => {
    const el = document.getElementById('legend-bsd');
    if (!p.time || !allData) { el.innerHTML = ''; return; }
    // 从原始数据找对应K/D值
    const bar = allData.indicator_series.find(b => b.time === p.time);
    if (!bar) return;
    el.innerHTML =
      `<span style="color:#ef5350">K <b>${bar.K?.toFixed(1) ?? '--'}</b></span>` +
      `<span style="color:#26a69a">D <b>${bar.D?.toFixed(1) ?? '--'}</b></span>`;
  });
}

// ── 数据加载 ─────────────────────────────────────────
let _loadAbort = null;  // 取消上一次未完成的 full 请求

async function loadData(mode = 'full') {
  const url = `${API}?period=${currentPeriod}&symbol=${currentSymbol}&name=${encodeURIComponent(currentSymbolName)}&mode=${mode}`;
  if (mode === 'full') {
    if (_loadAbort) { _loadAbort.abort(); }
    _loadAbort = new AbortController();
    document.getElementById('loading').classList.remove('hidden');
    updateMarketStatus();
  }
  try {
    const res = await fetch(url, mode === 'full' ? { signal: _loadAbort.signal } : {});
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (mode === 'update' && allData) {
      // 增量刷新：只更新最后几根K线和侧边栏信号，不重绘整个图表
      updateBars(data.indicator_series || []);
      updateHeader(data);
      updateSidebar(data);
      checkAndNotify(data, currentPeriod);
      // 把新bar合并进allData供canvas使用
      const newBars = data.indicator_series || [];
      newBars.forEach(nb => {
        const idx = allData.indicator_series.findIndex(b => b.time === nb.time);
        if (idx >= 0) allData.indicator_series[idx] = nb;
        else allData.indicator_series.push(nb);
      });
    } else {
      allData = data;
      renderAll(data);
    }
  } catch(e) {
    if (e.name === 'AbortError') return;  // 被新请求取消，静默忽略
    if (mode === 'full') {
      document.getElementById('loading').innerHTML = `<span style="color:#ef5350">加载失败: ${e.message}</span>`;
      return;
    }
  }
  if (mode === 'full') {
    document.getElementById('loading').classList.add('hidden');
  }
}

// 增量更新：只用 series.update() 更新最后几根，不 setData
function updateBars(bars) {
  bars.forEach(b => {
    if (b.open != null) {
      candleSeries.update({ time: b.time, open: b.open, high: b.high, low: b.low, close: b.close });
    }
    volSeries.update({ time: b.time, value: b.volume || 0,
      color: (b.close >= b.open) ? 'rgba(239,83,80,0.45)' : 'rgba(38,166,154,0.45)' });
    if (b['支撑'] != null) supportSeries.update({ time: b.time, value: b['支撑'] });
    ['M1','M2','M3','M4','M5'].forEach(name => {
      if (b[name] != null) maSeries[name].update({
        time: b.time, value: b[name],
        color: b[`${name}r`] ? '#FF00FF' : '#FFD700',
      });
    });
    markerSeries.update({ time: b.time, value: b.close });
  });
  // canvas 重绘波段王（轻量）
  requestAnimationFrame(() => drawBsdCanvas(allData.indicator_series));
  // 增量刷新后同步末根K线时间（若十字线不在激活状态）
  updateKlineLegend();
}

function renderAll(data) {
  const bars = data.indicator_series || [];
  if (!bars.length) return;

  // ── K线 ───────────────────────────────────────────
  candleSeries.setData(
    bars.filter(b => b.open != null).map(b => ({
      time: b.time, open: b.open, high: b.high, low: b.low, close: b.close
    }))
  );

  volSeries.setData(
    bars.map(b => ({
      time: b.time, value: b.volume || 0,
      color: (b.close >= b.open) ? 'rgba(239,83,80,0.45)' : 'rgba(38,166,154,0.45)'
    }))
  );

  // ── 支撑线 ────────────────────────────────────────
  supportSeries.setData(
    bars.filter(b => b['支撑'] != null).map(b => ({ time: b.time, value: b['支撑'] }))
  );

  // ── M1~M5 均线（黄色）+ M1S~M5S 上升段（粉色） ──
  // 用 setData 传递分段颜色（逐点切换颜色）
  ['M1','M2','M3','M4','M5'].forEach(name => {
    const pts = bars
      .filter(b => b[name] != null)
      .map(b => ({
        time: b.time,
        value: b[name],
        color: b[`${name}r`] ? '#FF00FF' : '#FFD700',  // 上升=粉色 下降=黄色
      }));
    maSeries[name].setData(pts);
  });

  // ── 信号标记 — 挂在最顶层 markerSeries 上，不被任何线遮挡
  // 黄点: 破浪(主图做多)  绿点: 破浪(主图做空)  — 公式仅有这两个K线信号
  markerSeries.setData(bars.map(b => ({ time: b.time, value: b.close })));
  const markers = [];
  bars.forEach(b => {
    if (b.po)   markers.push({ time: b.time, position: 'belowBar', color: '#FFD700', shape: 'circle', size: 1.2 });
    if (b.kong) markers.push({ time: b.time, position: 'aboveBar', color: '#00CC00', shape: 'circle', size: 1.2 });
  });
  markerSeries.setMarkers(markers);

  // ── 支撑压力位虚线 ────────────────────────────────
  // 先清除旧价格线
  activePriceLines.forEach(pl => { try { candleSeries.removePriceLine(pl); } catch(e) {} });
  activePriceLines = [];
  if (data.levels?.length) {
    data.levels.slice(0, 6).forEach(lv => {
      const pl = candleSeries.createPriceLine({
        price: lv.value,
        color: lv.current ? '#58a6ff' : '#30363d',
        lineWidth: 1,
        lineStyle: LightweightCharts.LineStyle.Dashed,
        axisLabelVisible: true,
        title: lv.name,
      });
      activePriceLines.push(pl);
    });
  }

  // ── 波段王：用 canvas 画色块，bsdBaseSeries 固定纵轴 ──
  // 注意：bsdBaseSeries/extremeLine 必须覆盖全部 bars 时间点，
  // 保证 bsdChart 时间轴与 kChart 完全对齐，否则逻辑索引会错位。
  bsdBaseSeries.setData([
    { time: bars[0].time, value: 0 },
    { time: bars[bars.length - 1].time, value: 100 },
  ]);

  // 极端线用全部 bars 时间轴
  extremeLine10.setData(bars.map(b => ({ time: b.time, value: 10 })));
  extremeLine90.setData(bars.map(b => ({ time: b.time, value: 90 })));

  // 首次加载或切换品种/周期时，默认显示最近200条，刷新时保持当前视图
  if (!viewInitialized) {
    const total = bars.length;
    const defaultSpan = Math.min(200, total);
    const anchor = total - 1 + 3;
    const initRange = { from: anchor - defaultSpan, to: anchor };
    kChart.timeScale().setVisibleLogicalRange(initRange);
    bsdChart.timeScale().setVisibleLogicalRange(initRange);
    viewInitialized = true;
  }

  requestAnimationFrame(() => drawBsdCanvas(bars));

  updateHeader(data);
  updateSidebar(data);
  checkAndNotify(data, currentPeriod);

  // 刷新所有动态副图
  subCharts.forEach(s => renderSubChart(s, bars));

  // 初始化K线图内时间：显示末根K线开盘时间
  updateKlineLegend();
}

// ── 波段王 canvas 色块柱（STICKLINE K/D 之间，红=多/绿=空）──
function drawBsdCanvas(bars) {
  const canvas = document.getElementById('bsd-canvas');
  const wrap   = document.getElementById('wrap-bsd');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const valid = bars.filter(b => b.K != null && b.D != null);
  if (valid.length < 2) return;

  const ts = bsdChart.timeScale();
  const x0 = ts.timeToCoordinate(valid[0].time);
  const x1 = ts.timeToCoordinate(valid[1].time);
  const barPx = (x0 != null && x1 != null) ? Math.abs(x1 - x0) : 8;
  const hw = Math.max(2, barPx * 0.48); // 接近铺满，留极小间隙

  const yZero = bsdBaseSeries.priceToCoordinate(0);
  for (const b of valid) {
    const x = ts.timeToCoordinate(b.time);
    if (x == null) continue;
    const yK = bsdBaseSeries.priceToCoordinate(b.K);
    const yD = bsdBaseSeries.priceToCoordinate(b.D);
    if (yK == null || yD == null || yZero == null) continue;
    // 慧赢 STICKLINE 是 K 到 D 之间，但6层叠加很粗
    // 画法：从 min(K,D) 到 max(K,D)，颜色由 K>=D 决定
    const top = Math.min(yK, yD);
    const ht  = Math.max(2, Math.abs(yK - yD));
    ctx.fillStyle = b.K >= b.D ? '#CC0000' : '#00AA00';
    ctx.fillRect(x - hw, top, hw * 2, ht);
    // 再画一层半透明加强视觉厚度（模拟慧赢6层叠加效果）
    ctx.fillStyle = b.K >= b.D ? 'rgba(255,60,60,0.35)' : 'rgba(0,200,0,0.35)';
    ctx.fillRect(x - hw - 1, top, hw * 2 + 2, ht);
  }
}

// ── Header ───────────────────────────────────────────
function updateHeader(data) {
  const meta = data.meta || {};
  document.getElementById('hdr-name').textContent = data.name || '期货看板';
  document.getElementById('hdr-contract').textContent = data.symbol || '';
  const price = meta.close;
  if (price) {
    document.getElementById('hdr-price').textContent = price.toFixed(0);
    const bars = data.indicator_series || [];
    const prev = bars.length > 1 ? bars[bars.length - 2]?.close : null;
    if (prev) {
      const pct  = ((price - prev) / prev * 100).toFixed(2);
      const isUp = price >= prev;
      const el = document.getElementById('hdr-chg');
      el.textContent = (isUp ? '+' : '') + pct + '%';
      el.className = 'chg ' + (isUp ? 'up' : 'dn');
      document.getElementById('hdr-price').style.color = isUp ? '#ef5350' : '#26a69a';
    }
  }
}

function setupResizer(resEl, topEl, botEl, topChart, botChart) {
  // 支持传 id 字符串或直接传 DOM 元素
  if (typeof resEl === 'string') resEl = document.getElementById(resEl);
  if (typeof topEl === 'string') topEl = document.getElementById(topEl);
  if (typeof botEl === 'string') botEl = document.getElementById(botEl);

  let startY, startTop, startBot;
  resEl.addEventListener('mousedown', e => {
    startY = e.clientY;
    startTop = topEl.clientHeight;
    startBot = botEl.clientHeight;
    const cw = document.getElementById('charts-area').clientWidth;
    const onMove = e2 => {
      const dy = e2.clientY - startY;
      const newTop = Math.max(80, startTop + dy);
      const newBot = Math.max(60, startBot - dy);
      topEl.style.height = newTop + 'px';
      botEl.style.height = newBot + 'px';
      topChart?.resize(cw, newTop);
      botChart?.resize(cw, newBot);
      if (allData) requestAnimationFrame(() => {
        drawBsdCanvas(allData.indicator_series);
        subCharts.forEach(s => drawSubCanvas(s, allData.indicator_series));
      });
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ── 右锚缩放：滚轮以最右侧（最新K线）为固定轴缩放 ──
// 用 setVisibleLogicalRange 控制，to 固定在数据末尾，from 随缩放移动。
let _rightAnchorTo = null; // 缩放时固定的右端逻辑索引

function initRightAnchorZoom() {
  const chartEls = [
    document.getElementById('chart-kline'),
    document.getElementById('chart-bsd'),
  ];
  chartEls.forEach(el => {
    el.addEventListener('wheel', e => {
      e.preventDefault();
      e.stopPropagation();
      const ts = kChart.timeScale();
      const range = ts.getVisibleLogicalRange();
      if (!range) return;

      // 固定锚点：用数据总条数作为右端（不随用户拖拽变动）
      const totalBars = allData?.indicator_series?.length ?? 0;
      const anchor = totalBars - 1 + 3; // +3 是 rightOffset 留白

      const span = range.to - range.from;
      // 向上滚(deltaY<0)=放大=看更少K线；向下滚=缩小=看更多K线
      const factor = e.deltaY < 0 ? 0.85 : 1.18;
      const newSpan = Math.max(5, Math.min(span * factor, totalBars * 2));

      const newRange = { from: anchor - newSpan, to: anchor };
      kChart.timeScale().setVisibleLogicalRange(newRange);
      bsdChart.timeScale().setVisibleLogicalRange(newRange);
      if (allData) requestAnimationFrame(() => drawBsdCanvas(allData.indicator_series));
    }, { passive: false });
  });
}

const DEFAULT_WATCHLIST = [
  { symbol: 'BC0', name: '国际铜主力' },
  { symbol: 'AG0', name: '白银主力' },
  { symbol: 'P0',  name: '棕榈油主力' },

const WATCHLIST_VERSION = '4';
function loadWatchlist() {
  try {
    // 版本不匹配时重置为默认（合约换月）
    if (localStorage.getItem('watchlist_ver') !== WATCHLIST_VERSION) {
      localStorage.setItem('watchlist_ver', WATCHLIST_VERSION);
      localStorage.removeItem('watchlist');
      return DEFAULT_WATCHLIST;
    }
    return JSON.parse(localStorage.getItem('watchlist')) || DEFAULT_WATCHLIST;
  } catch { return DEFAULT_WATCHLIST; }
}

function saveWatchlist(list) {
  localStorage.setItem('watchlist', JSON.stringify(list));
}

function renderWatchlist() {
  const list = loadWatchlist();
  const container = document.getElementById('watchlist');
  container.innerHTML = '';
  list.forEach(item => {
    const div = document.createElement('div');
    div.className = 'watchlist-item' + (item.symbol === currentSymbol ? ' active' : '');
    div.dataset.symbol = item.symbol;
    div.dataset.name = item.name;
    // 状态圆点 / 名称 / 代码 / 删除按钮
    const dot = document.createElement('span');
    dot.className = `wl-dot ${_symbolStatus[item.symbol] || 'none'}`;
    const nameEl = document.createElement('div');
    nameEl.style.cssText = 'display:flex;flex-direction:column;gap:1px;flex:1;';
    nameEl.innerHTML = `<span class="wl-name">${item.name.replace(/[0-9]+$/, '')}</span><span class="wl-code">${item.symbol}</span>`;
    const del = document.createElement('span');
    del.className = 'wl-del';
    del.textContent = '×';
    del.title = '删除';
    del.addEventListener('click', e => {
      e.stopPropagation();
      const newList = loadWatchlist().filter(i => i.symbol !== item.symbol);
      saveWatchlist(newList);
      // 如果删的是当前品种，切到第一个
      if (item.symbol === currentSymbol && newList.length > 0) {
        currentSymbol = newList[0].symbol;
        currentSymbolName = newList[0].name;
        viewInitialized = false;
        loadData();
      }
      renderWatchlist();
    });
    div.appendChild(dot);
    div.appendChild(nameEl);
    div.appendChild(del);
    div.addEventListener('click', () => {
      currentSymbol = item.symbol;
      currentSymbolName = item.name;
      viewInitialized = false;
      renderWatchlist();
      loadData();
    });
    container.appendChild(div);
  });
}

async function addToWatchlist(symbol, name) {
  symbol = symbol.toUpperCase().trim();
  if (!symbol) return;
  const list = loadWatchlist();
  if (list.find(i => i.symbol === symbol)) {
    // 已存在，直接切换
    currentSymbol = symbol;
    currentSymbolName = name || symbol;
    viewInitialized = false;
    renderWatchlist();
    loadData();
    return;
  }
  // 验证合约存在
  const btn = document.getElementById('wl-add-btn');
  btn.textContent = '…';
  btn.disabled = true;
  try {
    const res = await fetch(`/api/resolve?symbol=${encodeURIComponent(symbol)}`);
    const data = await res.json();
    if (data.error) { alert(data.error); return; }
    const finalName = name || data.name || symbol;
    list.push({ symbol, name: finalName });
    saveWatchlist(list);
    currentSymbol = symbol;
    currentSymbolName = finalName;
    viewInitialized = false;
    renderWatchlist();
    loadData();
  } catch(e) {
    alert('添加失败: ' + e.message);
  } finally {
    btn.textContent = '+ 添加';
    btn.disabled = false;
  }
}

// ── 全自选扫描（多周期支持）────────────────────────────
const _watchlistNotified = {};

// 页面刚加载时设为 true：第一轮扫描只录状态，不弹窗；完成后自动关闭
let _silentInit = true;

async function scanAllWatchlist() {
  const silent = _silentInit;   // 本轮是否静默（页面加载后第一次）
  const alertPeriods = getAlertPeriods();
  const list = loadWatchlist();
  const now = Date.now();

  for (const item of list) {
    const triggered = {}; // period -> {sigType, data}

    for (const period of alertPeriods) {
      // 按周期限速：避免过于频繁的 API 调用
      const minInterval = SCAN_INTERVALS_MS[period] ?? 5 * 60000;
      const scanKey = `${item.symbol}|${period}`;
      if (_lastScanTime[scanKey] && now - _lastScanTime[scanKey] < minInterval) continue;

      try {
        const res = await fetch(`${API}?period=${period}&symbol=${item.symbol}&name=${encodeURIComponent(item.name)}&mode=update`);
        const scanData = await res.json();
        if (scanData.error) continue;
        _lastScanTime[scanKey] = now;

        const sig  = scanData.signals || {};
        const meta = scanData.meta    || {};
        const sigTime = meta.datetime || '';
        const notifyKey = `${item.symbol}|${period}`;
        if (!_watchlistNotified[notifyKey]) _watchlistNotified[notifyKey] = {};
        const prev = _watchlistNotified[notifyKey];

        if (sig['做多'] && !(prev.type === '做多' && prev.time === sigTime)) {
          prev.type = '做多'; prev.time = sigTime;
          if (!silent) triggered[period] = { sigType: '做多', data: scanData };
        } else if (sig['做空'] && !(prev.type === '做空' && prev.time === sigTime)) {
          prev.type = '做空'; prev.time = sigTime;
          if (!silent) triggered[period] = { sigType: '做空', data: scanData };
        }
      } catch(e) {}
    }

    if (silent) continue;  // 静默模式：只录状态，不弹

    // 共振检测
    const entries = Object.entries(triggered);
    if (entries.length === 0) continue;
    const longs  = entries.filter(([, v]) => v.sigType === '做多');
    const shorts = entries.filter(([, v]) => v.sigType === '做空');

    if (longs.length >= 2) {
      const lastEntry = longs[longs.length - 1];
      showResonanceToast(lastEntry[1].data, longs.map(([p]) => p), '做多');
    } else if (shorts.length >= 2) {
      const lastEntry = shorts[shorts.length - 1];
      showResonanceToast(lastEntry[1].data, shorts.map(([p]) => p), '做空');
    } else {
      for (const [period, { sigType, data: scanData }] of entries) {
        showSignalToast(scanData, sigType, period);
      }
    }
  }

  // 第一次扫描完成后解除静默，此后正常弹窗
  if (silent) _silentInit = false;
}

async function updateTrendPanel() {

function renderTrendPanel(data) {
  if (!data || !data.trend) return;
  const trend = data.trend;
  const order = [['weekly','周线'],['daily','日线'],['120','120分'],['60','60分'],['30','30分'],['15','15分']];
  const statusIcon = { bull:'🔴 多头', bear:'🟢 空头', wait:'🟡 等待', unknown:'⚫ --' };

  const list = document.getElementById('trend-panel-list');
  if (!list) return;
  list.innerHTML = '';

  order.forEach(([p, lbl]) => {
    const t = trend[p] || {};
    const row = document.createElement('div');
    row.className = 'trend-row';
    const kdText = (t.K != null && t.D != null) ? `K${t.K.toFixed(0)}/D${t.D.toFixed(0)}` : '';
    row.innerHTML =
      `<span class="trend-period">${lbl}</span>` +
      `<span class="trend-status ${t.status || 'unknown'}">${statusIcon[t.status] || '⚫ --'}</span>` +
      `<span class="trend-kd">${kdText}</span>`;
    list.appendChild(row);
  });

  // 共振提示
  const valid = order.filter(([p]) => trend[p]?.status && trend[p]?.status !== 'unknown');
  const bulls = valid.filter(([p]) => trend[p].status === 'bull').length;
  const bears = valid.filter(([p]) => trend[p].status === 'bear').length;
  const msg = document.getElementById('trend-resonance-msg');
  if (!msg) return;

  if (valid.length > 0 && bulls === valid.length) {
    msg.textContent = '🔴🔴 强势多头共振';
    msg.className = 'trend-resonance bull'; msg.style.display = 'block';
  } else if (valid.length > 0 && bears === valid.length) {
    msg.textContent = '🟢🟢 强势空头共振';
    msg.className = 'trend-resonance bear'; msg.style.display = 'block';
  } else if (bulls > 0 && bears > 0) {
    msg.textContent = '⚠️ 趋势分歧，谨慎操作';
    msg.className = 'trend-resonance mixed'; msg.style.display = 'block';
  } else {
    msg.style.display = 'none';
  }
}

function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const beep = (t, freq, dur) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.4, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.start(t);
      osc.stop(t + dur);
    };
    const t = ctx.currentTime;
    beep(t,       880,  0.15);
    beep(t + 0.2, 880,  0.15);
    beep(t + 0.4, 1100, 0.3);
  } catch(e) {}
}

// ── 弹窗时效 ──────────────────────────────────────────

function getPopupDurationForPeriod(period) {
  const manual = localStorage.getItem('popup_duration');
  if (manual && manual !== 'auto') {
    return manual === 'never' ? null : parseInt(manual) * 60000;
  }
  const base = (ALERT_PERIOD_DURATIONS[period] || 15) * 60000;
  const h = new Date().getHours();
  return (h >= 21 || h < 6) ? Math.max(base, 30 * 60000) : base;
}

function getPopupDuration() {
  return getPopupDurationForPeriod('30');
}
function getEffectiveDuration() {
  return getPopupDurationForPeriod(currentPeriod);
}
function fmtRemain(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}
function updateBell() {
  const badge = document.getElementById('bell-badge');
  const n = _unreadSignals.length;
  badge.textContent = n > 9 ? '9+' : n;
  badge.style.display = n ? 'flex' : 'none';
}
function updateSoundTimer() {
  const hasActive = Object.keys(_activePopups).length > 0;
  if (hasActive && !window._alertSoundTimer) {
    playAlertSound();
    window._alertSoundTimer = setInterval(playAlertSound, 2500);
  } else if (!hasActive && window._alertSoundTimer) {
    clearInterval(window._alertSoundTimer);
    window._alertSoundTimer = null;
  }
}

function showSignalToast(data, sigType, period) {
  period = period || '30';
  const periodLabel = ALERT_PERIOD_LABELS[period] || period;
  const sym    = data.symbol;
  const isLong = sigType === '做多';
  const meta   = data.meta || {};
  const dt     = meta.datetime || '';
  const expKey = `${sym}|${dt.slice(0, 16)}`;

  if (_activePopups[sym]) return;
  if (Object.keys(_activePopups).length >= 3) {
    _unreadSignals.push({ data, sigType, period });
    updateBell();
    return;

  _symbolStatus[sym] = isLong ? 'long' : 'short';
  const duration  = getPopupDurationForPeriod(period);
  const startTime = Date.now();

  const el = document.createElement('div');
  el.className = `signal-alert ${isLong ? 'long' : 'short'}`;

    `</div>`;

  const progressBar = el.querySelector('.signal-progress-bar');

  const state = { el, ticker: null, autoClose: null };

  function closeAlert(expired) {
    el.remove();

      remainEl.textContent = `剩余时效：${fmtRemain(rem)} ⏱`;
    }, 1000);

function initNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission();

}

function checkAndNotify(data, period) {
  period = period || data.period || '30';
  const alertPeriods = getAlertPeriods();
  // 只在已配置的触发周期上弹窗
  if (!alertPeriods.includes(period)) return;

  const sig  = data.signals || {};
  const meta = data.meta    || {};
  const sym  = data.symbol;
  const time = meta.datetime || '';
  const notifyKey = `${sym}|${period}`;

  if (!_watchlistNotified[notifyKey]) _watchlistNotified[notifyKey] = {};
  const prev = _watchlistNotified[notifyKey];

  if (sig['做多'] && !(prev.type === '做多' && prev.time === time)) {
    prev.type = '做多'; prev.time = time;
    if (!_silentInit) {
      showSignalToast(data, '做多', period);
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(`▲ 做多信号 — ${data.name} [${ALERT_PERIOD_LABELS[period]||period}]`, {
          body: `${time.slice(0,16)}  收盘 ${meta.close?.toFixed(0)}  K=${meta.K?.toFixed(1)}`,
          tag:  `${sym}-long-${period}`,
        });
      }
    }
  }

  if (sig['做空'] && !(prev.type === '做空' && prev.time === time)) {
    prev.type = '做空'; prev.time = time;
    if (!_silentInit) {
      showSignalToast(data, '做空', period);
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(`▼ 做空信号 — ${data.name} [${ALERT_PERIOD_LABELS[period]||period}]`, {
          body: `${time.slice(0,16)}  收盘 ${meta.close?.toFixed(0)}  K=${meta.K?.toFixed(1)}`,
          tag:  `${sym}-short-${period}`,
        });
      }
    }
  }
}

});

// ── 趋势刷新按钮 ───────────────────────────────────────
document.getElementById('trend-refresh-btn').addEventListener('click', updateTrendPanel);

// ── 启动 ─────────────────────────────────────────────
initCharts();
initRightAnchorZoom();
initNotifications();
updateAlertPeriodLabel();
renderAlertPeriodDropdown();
// 同步设置面板触发周期显示
(function() {
  const td = document.getElementById('trigger-period-display');
  if (!td) return;
  const p = getAlertPeriods();
  td.textContent = (p.length === 1 ? (ALERT_PERIOD_LABELS[p[0]] || p[0]) : p.length + '周期') + ' ▶';
})();

// 加载已保存的副图插件（排除内置的 bsd_wang/main_signal）
const BUILTIN_IDS = new Set(['bsd_wang', 'main_signal']);
fetch('/api/indicators').then(r => r.json()).then(metas => {
  metas.filter(m => m.panel === 'sub' && !BUILTIN_IDS.has(m.id))
       .forEach(m => addSubChart(m, allData?.indicator_series));
}).catch(() => {});

loadData();
// 首次加载趋势面板（稍延迟，等主数据先渲染完）
setTimeout(updateTrendPanel, 2000);
</script>
</body>
</html>
