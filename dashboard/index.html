<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期货交易看板</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #000000; --bg2: #0a0a0a; --bg3: #111111; --border: #2a2a2a;
  --text: #e6edf3; --muted: #7d8590; --accent: #58a6ff;
  --bull: #ef5350; --bear: #26a69a;
}
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

#header { display: flex; align-items: center; gap: 12px; padding: 0 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; height: 48px; }
#header .contract { font-size: 15px; font-weight: 700; }
#header .price { font-size: 20px; font-weight: 700; }
#header .chg { font-size: 12px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.chg.up { background: rgba(239,83,80,.15); color: var(--bull); }
.chg.dn { background: rgba(38,166,154,.15); color: var(--bear); }
.sep { width: 1px; height: 24px; background: var(--border); flex-shrink:0; }
.ts { color: var(--muted); font-size: 12px; }
.spacer { flex: 1; }
.period-btns { display: flex; gap: 4px; }
.period-btn { padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 500; transition: all .15s; }
.period-btn:hover { border-color: var(--accent); color: var(--accent); }
.period-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.icon-btn { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all .15s; }
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
@keyframes spin { to { transform: rotate(360deg); } }

#main { display: flex; flex: 1; overflow: hidden; }

#sidebar { width: 240px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; }
.s-card { padding: 12px 14px; border-bottom: 1px solid var(--border); }
.s-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
.signal-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.signal-badge.long { background: rgba(239,83,80,.18); color: var(--bull); }
.signal-badge.exit { background: rgba(38,166,154,.18); color: var(--bear); }
.signal-badge.wait { background: rgba(125,133,144,.12); color: var(--muted); }
.sub-sigs { display: flex; flex-direction: column; gap: 5px; }
.sub-sig { display: flex; justify-content: space-between; align-items: center; }
.sub-sig .lbl { color: var(--muted); font-size: 12px; }
.sub-sig .val { font-size: 12px; font-weight: 600; }
.val.on { color: #4caf50; }
.val.off { color: var(--muted); }
.metric-row { display: flex; justify-content: space-between; margin-bottom: 7px; }
.metric-row .lbl { color: var(--muted); }
.metric-row .val { font-weight: 600; }
.val.bull { color: var(--bull); }
.val.bear { color: var(--bear); }
.level-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
.level-row.cur { background: rgba(88,166,255,.1); border-radius: 4px; padding: 4px 6px; }
.level-row .lv-name { color: var(--muted); }
.level-row .lv-val { font-weight: 600; font-family: monospace; }
.hist-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(48,54,61,.5); font-size: 12px; }
.hist-item:last-child { border: none; }
.hist-long { color: var(--bull); font-weight: 700; }
.hist-exit { color: var(--bear); font-weight: 700; }

/* 自选股面板 */
.wl-search-wrap { position: relative; margin-bottom: 8px; }
.wl-search { width: 100%; background: #111; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 10px; outline: none; transition: border-color .15s; }
.wl-search:focus { border-color: var(--accent); }
.wl-search::placeholder { color: var(--muted); }
.wl-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #1a1a1a; border: 1px solid var(--border); border-radius: 6px; z-index: 200; max-height: 220px; overflow-y: auto; display: none; box-shadow: 0 8px 24px rgba(0,0,0,.6); }
.wl-dropdown.open { display: block; }
.wl-drop-item { padding: 7px 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 12px; transition: background .1s; }
.wl-drop-item:hover { background: rgba(88,166,255,.12); }
.wl-drop-item .di-name { color: var(--text); font-weight: 600; }
.wl-drop-item .di-meta { color: var(--muted); font-size: 11px; }
.wl-drop-searching { padding: 10px; color: var(--muted); font-size: 12px; text-align: center; }
.wl-add-row { display: flex; gap: 6px; margin-top: 6px; }
.wl-add-input { flex: 1; background: #111; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 5px 8px; outline: none; }
.wl-add-input:focus { border-color: var(--accent); }
.wl-add-btn { padding: 5px 10px; background: var(--accent); border: none; border-radius: 6px; color: #fff; font-size: 12px; cursor: pointer; white-space: nowrap; }
.wl-add-btn:hover { opacity: .85; }
.watchlist-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 6px; border-radius: 5px; cursor: pointer; transition: background .12s; }
.watchlist-item:hover { background: rgba(88,166,255,.08); }
.watchlist-item.active { background: rgba(88,166,255,.16); }
.watchlist-item .wl-name { font-size: 13px; font-weight: 600; color: var(--text); }
.watchlist-item .wl-code { font-size: 11px; color: var(--muted); }
.watchlist-item .wl-del { font-size: 14px; color: var(--muted); padding: 0 2px; line-height: 1; opacity: 0; transition: opacity .12s; }
.watchlist-item:hover .wl-del { opacity: 1; }
.watchlist-item .wl-del:hover { color: #ef5350; }

#charts-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.chart-wrap { position: relative; overflow: hidden; }
.chart-wrap + .chart-wrap { border-top: 1px solid var(--border); }
.chart-label { position: absolute; top: 6px; left: 10px; z-index: 10; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; pointer-events: none; }
.chart-legend { position: absolute; top: 6px; left: 60px; z-index: 10; font-size: 11px; color: var(--text); pointer-events: none; display: flex; gap: 10px; flex-wrap: wrap; }
.resizer { height: 5px; background: var(--border); cursor: ns-resize; flex-shrink: 0; transition: background .15s; }
.resizer:hover { background: var(--accent); }
#loading { position: absolute; inset: 0; background: rgba(13,17,23,.88); display: flex; align-items: center; justify-content: center; z-index: 100; font-size: 14px; color: var(--muted); flex-direction: column; gap: 8px; }
#loading.hidden { display: none; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
body.fullscreen #sidebar { display: none; }

/* 波段王 canvas overlay */
.bsd-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }
</style>
</head>
<body>

<div id="header">
  <span id="hdr-name" class="contract">期货看板</span>
  <span id="hdr-contract" style="color:var(--muted);font-size:12px">P2609</span>
  <div class="sep"></div>
  <span id="hdr-price" class="price" style="color:var(--bull)">--</span>
  <span id="hdr-chg" class="chg up">--</span>
  <div class="sep"></div>
  <span id="hdr-ts" class="ts">--</span>
  <div class="spacer"></div>
  <div class="period-btns">
    <button class="period-btn" data-p="1">1分</button>
    <button class="period-btn" data-p="5">5分</button>
    <button class="period-btn active" data-p="15">15分</button>
    <button class="period-btn" data-p="30">30分</button>
    <button class="period-btn" data-p="60">60分</button>
    <button class="period-btn" data-p="daily">日线</button>
  </div>
  <div class="sep"></div>
  <button class="period-btn" id="btn-import" style="padding:4px 12px;">导入公式</button>
  <button class="icon-btn" id="btn-refresh" title="刷新">⟳</button>
  <button class="icon-btn" id="btn-fs" title="全屏/还原">⛶</button>
</div>

<!-- 导入公式模态框 -->
<div id="modal-import" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#111;border:1px solid #2a2a2a;border-radius:10px;width:560px;max-width:95vw;padding:24px;display:flex;flex-direction:column;gap:14px;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:15px;font-weight:700;">导入慧赢公式</span>
      <button id="modal-close" style="background:none;border:none;color:#7d8590;font-size:20px;cursor:pointer;line-height:1;">×</button>
    </div>
    <div style="display:flex;gap:10px;">
      <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
        <label style="font-size:11px;color:#7d8590;">指标名称</label>
        <input id="fi-name" placeholder="如：JLHB绝路航标" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;color:#e6edf3;font-size:13px;padding:7px 10px;outline:none;">
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <label style="font-size:11px;color:#7d8590;">位置</label>
        <select id="fi-panel" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;color:#e6edf3;font-size:13px;padding:7px 10px;outline:none;">
          <option value="sub">副图</option>
          <option value="main">主图</option>
        </select>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;">
      <label style="font-size:11px;color:#7d8590;">TDX 公式代码</label>
      <textarea id="fi-source" rows="12" placeholder="粘贴慧赢/通达信公式…" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;color:#e6edf3;font-size:12px;font-family:monospace;padding:10px;outline:none;resize:vertical;line-height:1.5;"></textarea>
    </div>
    <div id="fi-error" style="color:#ef5350;font-size:12px;display:none;"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button id="fi-cancel" style="padding:8px 18px;background:transparent;border:1px solid #2a2a2a;border-radius:6px;color:#7d8590;cursor:pointer;font-size:13px;">取消</button>
      <button id="fi-submit" style="padding:8px 18px;background:#58a6ff;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:13px;font-weight:600;">解析并添加</button>
    </div>
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <div class="s-card">
      <div class="s-title">自选</div>
      <!-- 搜索框 -->
      <div class="wl-search-wrap">
        <input id="wl-search" class="wl-search" placeholder="搜索品种或代码…" autocomplete="off">
        <div id="wl-dropdown" class="wl-dropdown"></div>
      </div>
      <!-- 直接输入合约代码添加 -->
      <div class="wl-add-row">
        <input id="wl-add-input" class="wl-add-input" placeholder="如 RB2510" autocomplete="off">
        <button id="wl-add-btn" class="wl-add-btn">+ 添加</button>
      </div>
      <!-- 自选列表 -->
      <div id="watchlist" style="margin-top:10px"></div>
    </div>
    <div class="s-card">
      <div class="s-title">当前信号</div>
      <div id="sig-badge" class="signal-badge wait">◉ 等待信号</div>
      <div class="sub-sigs" style="margin-top:10px">
        <div class="s-title" style="margin-bottom:6px">做多条件</div>
        <div class="sub-sig"><span class="lbl">① 黄点 破浪</span><span id="s-po" class="val off">--</span></div>
        <div class="sub-sig"><span class="lbl">② 波段王红色 K>D</span><span id="s-bsdm" class="val off">--</span></div>
        <div class="sub-sig"><span class="lbl">③ K > 30</span><span id="s-kgt30" class="val off">-- </span></div>
      </div>
      <div class="sub-sigs" style="margin-top:12px">
        <div class="s-title" style="margin-bottom:6px">离场条件</div>
        <div class="sub-sig"><span class="lbl">① 绿点 空仓</span><span id="s-kong" class="val off">--</span></div>
        <div class="sub-sig"><span class="lbl">② 波段王绿色 K&lt;D</span><span id="s-bsdk" class="val off">--</span></div>
        <div class="sub-sig"><span class="lbl">③ K &lt; 80</span><span id="s-klt80" class="val off">--</span></div>
      </div>
    </div>
    <div class="s-card">
      <div class="s-title">历史信号</div>
      <div id="hist-list"></div>
    </div>
  </div>

  <div id="charts-area">
    <div id="loading"><div class="spinner"></div>加载数据中…</div>

    <!-- 主图 K线 -->
    <div id="wrap-kline" class="chart-wrap" style="height:55%">
      <div class="chart-label">K 线</div>
      <div class="chart-legend" id="legend-kline"></div>
      <div id="chart-kline" style="width:100%;height:100%"></div>
    </div>

    <div class="resizer" id="res1"></div>

    <!-- 波段王副图 -->
    <div id="wrap-bsd" class="chart-wrap" style="height:26%">
      <div class="chart-label">波段王</div>
      <div class="chart-legend" id="legend-bsd"></div>
      <!-- canvas 画色块柱 -->
      <canvas id="bsd-canvas" class="bsd-canvas"></canvas>
      <div id="chart-bsd" style="width:100%;height:100%"></div>
    </div>

  </div>
</div>

<script>
const API = '/api/data';
let currentPeriod = '15';
let currentSymbol = 'P0';
let currentSymbolName = '棕榈油主力';
let allData = null;
let kChart, bsdChart;
let candleSeries, volSeries, supportSeries, markerSeries;
let maSeries = {};
let bsdBaseSeries;
// 动态副图：{ id, chart, canvas, meta }
let subCharts = [];
let extremeLine10, extremeLine90;
let activePriceLines = [];
let viewInitialized = false;

const COMMON = {
  layout: { background: { color: '#000000' }, textColor: '#888888' },
  grid: { vertLines: { color: '#111111' }, horzLines: { color: '#111111' } },
  crosshair: {
    mode: LightweightCharts.CrosshairMode.Normal,
    vertLine: { color: '#58a6ff44', width: 1, style: 1 },
    horzLine: { color: '#58a6ff44', width: 1, style: 1 }
  },
  rightPriceScale: { borderColor: '#30363d' },
  timeScale: {
    borderColor: '#30363d',
    timeVisible: true,
    secondsVisible: false,
    rightOffset: 3,
    barSpacing: 12,
    minBarSpacing: 2,
  },
};

function h(id) { return document.getElementById(id).clientHeight; }
function w(id) { return document.getElementById(id).clientWidth;  }

function initCharts() {
  const cw = document.getElementById('charts-area').clientWidth;

  // ── 主图 ──────────────────────────────────────────
  kChart = LightweightCharts.createChart('chart-kline', {
    ...COMMON, width: cw, height: h('wrap-kline'),
  });

  // K线：慧赢配色 — 阳线红色，阴线白色
  candleSeries = kChart.addCandlestickSeries({
    upColor: '#ef5350',   downColor: '#ffffff',
    borderUpColor: '#ef5350', borderDownColor: '#cccccc',
    wickUpColor:   '#ef5350', wickDownColor:   '#cccccc',
  });

  // 成交量
  volSeries = kChart.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol',
  });
  kChart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });

  // 支撑线：慧赢蓝色，线宽2
  supportSeries = kChart.addLineSeries({
    color: '#00AAFF', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Solid,
    lastValueVisible: false, priceLineVisible: false, title: '支撑',
  });

  // M1~M5：粗细递增（1~3px），下降黄/上升粉，与慧赢带状视觉一致
  const maWidths = { M1: 1, M2: 1, M3: 2, M4: 2, M5: 3 };
  ['M1','M2','M3','M4','M5'].forEach(name => {
    maSeries[name] = kChart.addLineSeries({
      color: '#FFD700', lineWidth: maWidths[name],
      lastValueVisible: false, priceLineVisible: false, title: name,
    });
  });

  // 信号标记专用 series — 最后添加确保渲染在所有线条之上
  markerSeries = kChart.addLineSeries({
    color: 'transparent', lineWidth: 0,
    lastValueVisible: false, priceLineVisible: false,
  });

  // ── 波段王副图 ────────────────────────────────────
  bsdChart = LightweightCharts.createChart('chart-bsd', {
    ...COMMON, width: cw, height: h('wrap-bsd'),
    rightPriceScale: { borderColor: '#30363d', scaleMargins: { top: 0.02, bottom: 0.02 } },
  });

  // 用一条透明线固定纵轴范围 0~100
  bsdBaseSeries = bsdChart.addLineSeries({
    color: 'transparent', lineWidth: 0,
    lastValueVisible: false, priceLineVisible: false,
  });

  // 极端顶部线90：黄色实线（慧赢截图可见），底部线10不显示
  extremeLine10 = bsdChart.addLineSeries({
    color: 'transparent', lineWidth: 0,
    lastValueVisible: false, priceLineVisible: false,
  });
  extremeLine90 = bsdChart.addLineSeries({
    color: '#FFD700', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Solid,
    lastValueVisible: false, priceLineVisible: false,
  });

  syncCharts();
  setupLegends();
  initResizers();
}

// ── 时间轴联动（动态，支持任意数量图表）────────────────
let _syncing = false;
function getAllCharts() {
  return [kChart, bsdChart, ...subCharts.map(s => s.chart)].filter(Boolean);
}

function syncOneChart(src) {
  src.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (_syncing || !range) return;
    _syncing = true;
    getAllCharts().filter(c => c !== src).forEach(c => c.timeScale().setVisibleLogicalRange(range));
    if (allData) requestAnimationFrame(() => {
      drawBsdCanvas(allData.indicator_series);
      subCharts.forEach(s => { if (s.canvas) drawSubCanvas(s, allData.indicator_series); });
    });
    _syncing = false;
  });
}

function syncCharts() {
  syncOneChart(kChart);
  syncOneChart(bsdChart);
}


// ── 动态添加副图 ──────────────────────────────────────
function addSubChart(pluginMeta, bars) {
  const chartsArea = document.getElementById('charts-area');
  const cw = chartsArea.clientWidth;
  const id = pluginMeta.id;

  // 避免重复添加
  if (subCharts.find(s => s.id === id)) return;

  // 分隔条
  const resizer = document.createElement('div');
  resizer.className = 'resizer';

  // 图表容器
  const wrap = document.createElement('div');
  wrap.id = `wrap-sub-${id}`;
  wrap.className = 'chart-wrap';
  wrap.style.height = '22%';

  const label = document.createElement('div');
  label.className = 'chart-label';
  label.textContent = pluginMeta.name;

  const legend = document.createElement('div');
  legend.className = 'chart-legend';
  legend.id = `legend-sub-${id}`;

  const chartDiv = document.createElement('div');
  chartDiv.id = `chart-sub-${id}`;
  chartDiv.style.cssText = 'width:100%;height:100%';

  wrap.appendChild(label);
  wrap.appendChild(legend);
  wrap.appendChild(chartDiv);
  chartsArea.appendChild(resizer);
  chartsArea.appendChild(wrap);

  // 创建 chart
  const chart = LightweightCharts.createChart(chartDiv, {
    ...COMMON, width: cw, height: wrap.clientHeight,
  });

  // 固定纵轴（如果有 range 设置）
  const baseSeries = chart.addLineSeries({
    color: 'transparent', lineWidth: 0,
    lastValueVisible: false, priceLineVisible: false,
  });

  // hlines（水平参考线）
  const hlineSeries = (pluginMeta.hlines || []).map(hl =>
    chart.addLineSeries({
      color: hl.color || '#888', lineWidth: hl.width || 1,
      lastValueVisible: false, priceLineVisible: false,
    })
  );

  // 输出线 series（type=line 的）
  const lineSeries = {};
  (pluginMeta.outputs || []).filter(o => o.type === 'line').forEach(o => {
    lineSeries[o.col] = chart.addLineSeries({
      color: o.color || '#ffffff', lineWidth: o.width || 1,
      lastValueVisible: false, priceLineVisible: false,
    });
  });

  // stickline 用 canvas
  const hasStick = (pluginMeta.outputs || []).some(o => o.type === 'stickline');
  let canvas = null;
  if (hasStick) {
    canvas = document.createElement('canvas');
    canvas.className = 'bsd-canvas';
    wrap.appendChild(canvas);
  }

  const entry = { id, chart, wrap, baseSeries, hlineSeries, lineSeries, canvas, meta: pluginMeta };
  subCharts.push(entry);

  // 同步时间轴
  syncOneChart(chart);

  // 设置分隔条拖拽
  const prevWrap = resizer.previousElementSibling;
  setupResizer(resizer, prevWrap, wrap, getAllCharts()[getAllCharts().indexOf(chart) - 1], chart);

  // 渲染数据
  if (bars) renderSubChart(entry, bars);

  // window resize
  window.addEventListener('resize', () => {
    const cw2 = chartsArea.clientWidth;
    chart.resize(cw2, wrap.clientHeight);
    if (allData) drawSubCanvas(entry, allData.indicator_series);
  });
}

function renderSubChart(entry, bars) {
  const { chart, baseSeries, hlineSeries, lineSeries, canvas, meta } = entry;
  if (!bars || !bars.length) return;

  // 固定纵轴
  const range = meta.range;
  if (range) {
    baseSeries.setData([
      { time: bars[0].time, value: range[0] },
      { time: bars[bars.length - 1].time, value: range[1] },
    ]);
  } else {
    baseSeries.setData([
      { time: bars[0].time,              value: 0 },
      { time: bars[bars.length - 1].time, value: 0 },
    ]);
  }

  // hlines
  (meta.hlines || []).forEach((hl, i) => {
    hlineSeries[i]?.setData(bars.map(b => ({ time: b.time, value: hl.value })));
  });

  // 折线
  Object.entries(lineSeries).forEach(([col, series]) => {
    const out = (meta.outputs || []).find(o => o.col === col && o.type === 'line');
    const pts = bars.filter(b => b[col] != null).map(b => ({
      time: b.time, value: b[col],
      color: out?.color_rising ? (b[col + 'r'] ? out.color_rising : out.color) : out?.color,
    }));
    series.setData(pts);
  });

  // stickline canvas
  if (canvas) drawSubCanvas(entry, bars);
}

function drawSubCanvas(entry, bars) {
  const { canvas, chart, baseSeries, meta } = entry;
  if (!canvas) return;
  const wrap = entry.wrap;
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const stickOut = (meta.outputs || []).find(o => o.type === 'stickline');
  if (!stickOut) return;

  const col1 = stickOut.col;
  const col2 = stickOut.col2;
  const valid = bars.filter(b => b[col1] != null && b[col2] != null);
  if (valid.length < 2) return;

  const ts = chart.timeScale();
  const x0 = ts.timeToCoordinate(valid[0].time);
  const x1 = ts.timeToCoordinate(valid[1].time);
  const barPx = (x0 != null && x1 != null) ? Math.abs(x1 - x0) : 8;
  const hw = Math.max(2, barPx * 0.48);

  for (const b of valid) {
    const x  = ts.timeToCoordinate(b.time);
    if (x == null) continue;
    const yK = baseSeries.priceToCoordinate(b[col1]);
    const yD = baseSeries.priceToCoordinate(b[col2]);
    if (yK == null || yD == null) continue;
    const top = Math.min(yK, yD);
    const ht  = Math.max(2, Math.abs(yK - yD));
    const bull = b[col1] >= b[col2];
    ctx.fillStyle = bull ? (stickOut.color_bull || '#CC0000') : (stickOut.color_bear || '#00AA00');
    ctx.fillRect(x - hw, top, hw * 2, ht);
    ctx.fillStyle = bull ? 'rgba(255,60,60,0.35)' : 'rgba(0,200,0,0.35)';
    ctx.fillRect(x - hw - 1, top, hw * 2 + 2, ht);
  }
}

// ── 数据加载 ─────────────────────────────────────────
async function loadData(mode = 'full') {
  const url = `${API}?period=${currentPeriod}&symbol=${currentSymbol}&name=${encodeURIComponent(currentSymbolName)}&mode=${mode}`;
  if (mode === 'full') {
    document.getElementById('loading').classList.remove('hidden');
  }
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (mode === 'update' && allData) {
      // 增量刷新：只更新最后几根K线和侧边栏信号，不重绘整个图表
      updateBars(data.indicator_series || []);
      updateHeader(data);
      updateSidebar(data);
      checkAndNotify(data);
      // 把新bar合并进allData供canvas使用
      const newBars = data.indicator_series || [];
      newBars.forEach(nb => {
        const idx = allData.indicator_series.findIndex(b => b.time === nb.time);
        if (idx >= 0) allData.indicator_series[idx] = nb;
        else allData.indicator_series.push(nb);
      });
    } else {
      allData = data;
      renderAll(data);
    }
  } catch(e) {
    if (mode === 'full') {
      document.getElementById('loading').innerHTML = `<span style="color:#ef5350">加载失败: ${e.message}</span>`;
      return;
    }
  }
  if (mode === 'full') {
    document.getElementById('loading').classList.add('hidden');
  }
}

// 增量更新：只用 series.update() 更新最后几根，不 setData
function updateBars(bars) {
  bars.forEach(b => {
    if (b.open != null) {
      candleSeries.update({ time: b.time, open: b.open, high: b.high, low: b.low, close: b.close });
    }
    volSeries.update({ time: b.time, value: b.volume || 0,
      color: (b.close >= b.open) ? 'rgba(239,83,80,0.45)' : 'rgba(38,166,154,0.45)' });
    if (b['支撑'] != null) supportSeries.update({ time: b.time, value: b['支撑'] });
    ['M1','M2','M3','M4','M5'].forEach(name => {
      if (b[name] != null) maSeries[name].update({
        time: b.time, value: b[name],
        color: b[`${name}r`] ? '#FF00FF' : '#FFD700',
      });
    });
    markerSeries.update({ time: b.time, value: b.close });
  });
  // canvas 重绘波段王（轻量）
  requestAnimationFrame(() => drawBsdCanvas(allData.indicator_series));
}

function renderAll(data) {
  const bars = data.indicator_series || [];
  if (!bars.length) return;

  // ── K线 ───────────────────────────────────────────
  candleSeries.setData(
    bars.filter(b => b.open != null).map(b => ({
      time: b.time, open: b.open, high: b.high, low: b.low, close: b.close
    }))
  );

  volSeries.setData(
    bars.map(b => ({
      time: b.time, value: b.volume || 0,
      color: (b.close >= b.open) ? 'rgba(239,83,80,0.45)' : 'rgba(38,166,154,0.45)'
    }))
  );

  // ── 支撑线 ────────────────────────────────────────
  supportSeries.setData(
    bars.filter(b => b['支撑'] != null).map(b => ({ time: b.time, value: b['支撑'] }))
  );

  // ── M1~M5 均线（黄色）+ M1S~M5S 上升段（粉色） ──
  // 用 setData 传递分段颜色（逐点切换颜色）
  ['M1','M2','M3','M4','M5'].forEach(name => {
    const pts = bars
      .filter(b => b[name] != null)
      .map(b => ({
        time: b.time,
        value: b[name],
        color: b[`${name}r`] ? '#FF00FF' : '#FFD700',  // 上升=粉色 下降=黄色
      }));
    maSeries[name].setData(pts);
  });

  // ── 信号标记 — 挂在最顶层 markerSeries 上，不被任何线遮挡
  // 黄点: 破浪(主图做多)  绿点: 空仓(主图离场)  — 公式仅有这两个K线信号
  markerSeries.setData(bars.map(b => ({ time: b.time, value: b.close })));
  const markers = [];
  bars.forEach(b => {
    if (b.po)   markers.push({ time: b.time, position: 'belowBar', color: '#FFD700', shape: 'circle', size: 1.2 });
    if (b.kong) markers.push({ time: b.time, position: 'aboveBar', color: '#00CC00', shape: 'circle', size: 1.2 });
  });
  markerSeries.setMarkers(markers);

  // ── 支撑压力位虚线 ────────────────────────────────
  // 先清除旧价格线
  activePriceLines.forEach(pl => { try { candleSeries.removePriceLine(pl); } catch(e) {} });
  activePriceLines = [];
  if (data.levels?.length) {
    data.levels.slice(0, 6).forEach(lv => {
      const pl = candleSeries.createPriceLine({
        price: lv.value,
        color: lv.current ? '#58a6ff' : '#30363d',
        lineWidth: 1,
        lineStyle: LightweightCharts.LineStyle.Dashed,
        axisLabelVisible: true,
        title: lv.name,
      });
      activePriceLines.push(pl);
    });
  }

  // ── 波段王：用 canvas 画色块，bsdBaseSeries 固定纵轴 ──
  // 注意：bsdBaseSeries/extremeLine 必须覆盖全部 bars 时间点，
  // 保证 bsdChart 时间轴与 kChart 完全对齐，否则逻辑索引会错位。
  bsdBaseSeries.setData([
    { time: bars[0].time, value: 0 },
    { time: bars[bars.length - 1].time, value: 100 },
  ]);

  // 极端线用全部 bars 时间轴
  extremeLine10.setData(bars.map(b => ({ time: b.time, value: 10 })));
  extremeLine90.setData(bars.map(b => ({ time: b.time, value: 90 })));

  // 首次加载或切换品种/周期时，默认显示最近200条，刷新时保持当前视图
  if (!viewInitialized) {
    const total = bars.length;
    const defaultSpan = Math.min(200, total);
    const anchor = total - 1 + 3;
    const initRange = { from: anchor - defaultSpan, to: anchor };
    kChart.timeScale().setVisibleLogicalRange(initRange);
    bsdChart.timeScale().setVisibleLogicalRange(initRange);
    viewInitialized = true;
  }

  requestAnimationFrame(() => drawBsdCanvas(bars));

  updateHeader(data);
  updateSidebar(data);
  checkAndNotify(data);

  // 刷新所有动态副图
  subCharts.forEach(s => renderSubChart(s, bars));
}

// ── 波段王 canvas 色块柱（STICKLINE K/D 之间，红=多/绿=空）──
function drawBsdCanvas(bars) {
  const canvas = document.getElementById('bsd-canvas');
  const wrap   = document.getElementById('wrap-bsd');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const valid = bars.filter(b => b.K != null && b.D != null);
  if (valid.length < 2) return;

  const ts = bsdChart.timeScale();
  const x0 = ts.timeToCoordinate(valid[0].time);
  const x1 = ts.timeToCoordinate(valid[1].time);
  const barPx = (x0 != null && x1 != null) ? Math.abs(x1 - x0) : 8;
  const hw = Math.max(2, barPx * 0.48); // 接近铺满，留极小间隙

  const yZero = bsdBaseSeries.priceToCoordinate(0);
  for (const b of valid) {
    const x = ts.timeToCoordinate(b.time);
    if (x == null) continue;
    const yK = bsdBaseSeries.priceToCoordinate(b.K);
    const yD = bsdBaseSeries.priceToCoordinate(b.D);
    if (yK == null || yD == null || yZero == null) continue;
    // 慧赢 STICKLINE 是 K 到 D 之间，但6层叠加很粗
    // 画法：从 min(K,D) 到 max(K,D)，颜色由 K>=D 决定
    const top = Math.min(yK, yD);
    const ht  = Math.max(2, Math.abs(yK - yD));
    ctx.fillStyle = b.K >= b.D ? '#CC0000' : '#00AA00';
    ctx.fillRect(x - hw, top, hw * 2, ht);
    // 再画一层半透明加强视觉厚度（模拟慧赢6层叠加效果）
    ctx.fillStyle = b.K >= b.D ? 'rgba(255,60,60,0.35)' : 'rgba(0,200,0,0.35)';
    ctx.fillRect(x - hw - 1, top, hw * 2 + 2, ht);
  }
}

// ── Header ───────────────────────────────────────────
function updateHeader(data) {
  const meta = data.meta || {};
  document.getElementById('hdr-name').textContent = data.name || '期货看板';
  document.getElementById('hdr-contract').textContent = data.symbol || '';
  document.getElementById('hdr-ts').textContent = data.updated || '';
  const price = meta.close;
  if (price) {
    document.getElementById('hdr-price').textContent = price.toFixed(0);
    const bars = data.indicator_series || [];
    const prev = bars.length > 1 ? bars[bars.length - 2]?.close : null;
    if (prev) {
      const pct  = ((price - prev) / prev * 100).toFixed(2);
      const isUp = price >= prev;
      const el = document.getElementById('hdr-chg');
      el.textContent = (isUp ? '+' : '') + pct + '%';
      el.className = 'chg ' + (isUp ? 'up' : 'dn');
      document.getElementById('hdr-price').style.color = isUp ? '#ef5350' : '#26a69a';
    }
  }
}

// ── Sidebar ──────────────────────────────────────────
function updateSidebar(data) {
  const sig = data.signals || {};
  const meta = data.meta   || {};

  const badge = document.getElementById('sig-badge');
  if (sig['做多']) {
    badge.className = 'signal-badge long'; badge.textContent = '▲ 做多信号';
  } else if (sig['离场']) {
    badge.className = 'signal-badge exit'; badge.textContent = '▼ 离场信号';
  } else {
    badge.className = 'signal-badge wait'; badge.textContent = '◉ 等待信号';
  }

  function sv(id, on) {
    const el = document.getElementById(id);
    el.textContent = on ? '✔' : '✘';
    el.className = 'val ' + (on ? 'on' : 'off');
  }
  const kv = meta.K ?? 0;
  const dv = meta.D ?? 0;
  sv('s-po',    sig['破浪_黄点']);
  sv('s-bsdm',  kv >= dv && kv > 0);
  sv('s-kgt30', kv > 30);
  sv('s-kong',  sig['空仓_绿点']);
  sv('s-bsdk',  kv <= dv && kv > 0);
  sv('s-klt80', kv < 80);

  const histList = document.getElementById('hist-list');
  histList.innerHTML = '';
  (data.history || []).forEach(h => {
    const r = document.createElement('div');
    r.className = 'hist-item';
    const cls = h.signal.includes('做多') ? 'hist-long' : 'hist-exit';
    r.innerHTML = `<span>${h.date}</span><span>${h.close}</span><span class="${cls}">${h.signal}</span>`;
    histList.appendChild(r);
  });
}

function initResizers() {
  setupResizer('res1', 'wrap-kline', 'wrap-bsd', kChart, bsdChart);
  // 动态副图的分隔条在 addSubChart 里单独注册
}

function setupResizer(resEl, topEl, botEl, topChart, botChart) {
  // 支持传 id 字符串或直接传 DOM 元素
  if (typeof resEl === 'string') resEl = document.getElementById(resEl);
  if (typeof topEl === 'string') topEl = document.getElementById(topEl);
  if (typeof botEl === 'string') botEl = document.getElementById(botEl);

  let startY, startTop, startBot;
  resEl.addEventListener('mousedown', e => {
    startY = e.clientY;
    startTop = topEl.clientHeight;
    startBot = botEl.clientHeight;
    const cw = document.getElementById('charts-area').clientWidth;
    const onMove = e2 => {
      const dy = e2.clientY - startY;
      const newTop = Math.max(80, startTop + dy);
      const newBot = Math.max(60, startBot - dy);
      topEl.style.height = newTop + 'px';
      botEl.style.height = newBot + 'px';
      topChart?.resize(cw, newTop);
      botChart?.resize(cw, newBot);
      if (allData) requestAnimationFrame(() => {
        drawBsdCanvas(allData.indicator_series);
        subCharts.forEach(s => drawSubCanvas(s, allData.indicator_series));
      });
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ── 右锚缩放：滚轮以最右侧（最新K线）为固定轴缩放 ──
// 用 setVisibleLogicalRange 控制，to 固定在数据末尾，from 随缩放移动。
let _rightAnchorTo = null; // 缩放时固定的右端逻辑索引

function initRightAnchorZoom() {
  const chartEls = [
    document.getElementById('chart-kline'),
    document.getElementById('chart-bsd'),
  ];
  chartEls.forEach(el => {
    el.addEventListener('wheel', e => {
      e.preventDefault();
      e.stopPropagation();
      const ts = kChart.timeScale();
      const range = ts.getVisibleLogicalRange();
      if (!range) return;

      // 固定锚点：用数据总条数作为右端（不随用户拖拽变动）
      const totalBars = allData?.indicator_series?.length ?? 0;
      const anchor = totalBars - 1 + 3; // +3 是 rightOffset 留白

      const span = range.to - range.from;
      // 向上滚(deltaY<0)=放大=看更少K线；向下滚=缩小=看更多K线
      const factor = e.deltaY < 0 ? 0.85 : 1.18;
      const newSpan = Math.max(5, Math.min(span * factor, totalBars * 2));

      const newRange = { from: anchor - newSpan, to: anchor };
      kChart.timeScale().setVisibleLogicalRange(newRange);
      bsdChart.timeScale().setVisibleLogicalRange(newRange);
      if (allData) requestAnimationFrame(() => drawBsdCanvas(allData.indicator_series));
    }, { passive: false });
  });
}

// ── 自选股管理 ────────────────────────────────────────
const DEFAULT_WATCHLIST = [
  { symbol: 'BC0', name: '国际铜主力' },
  { symbol: 'AG0', name: '白银主力' },
  { symbol: 'P0',  name: '棕榈油主力' },
  { symbol: 'CU0', name: '铜主力' },
  { symbol: 'SA0', name: '纯碱主力' },
];

const WATCHLIST_VERSION = '3';
function loadWatchlist() {
  try {
    // 版本不匹配时重置为默认（合约换月）
    if (localStorage.getItem('watchlist_ver') !== WATCHLIST_VERSION) {
      localStorage.setItem('watchlist_ver', WATCHLIST_VERSION);
      localStorage.removeItem('watchlist');
      return DEFAULT_WATCHLIST;
    }
    return JSON.parse(localStorage.getItem('watchlist')) || DEFAULT_WATCHLIST;
  } catch { return DEFAULT_WATCHLIST; }
}

function saveWatchlist(list) {
  localStorage.setItem('watchlist', JSON.stringify(list));
}

function renderWatchlist() {
  const list = loadWatchlist();
  const container = document.getElementById('watchlist');
  container.innerHTML = '';
  list.forEach(item => {
    const div = document.createElement('div');
    div.className = 'watchlist-item' + (item.symbol === currentSymbol ? ' active' : '');
    div.dataset.symbol = item.symbol;
    div.dataset.name = item.name;
    // 名称 / 代码 / 删除按钮
    const nameEl = document.createElement('div');
    nameEl.style.cssText = 'display:flex;flex-direction:column;gap:1px;';
    nameEl.innerHTML = `<span class="wl-name">${item.name.replace(/[0-9]+$/, '')}</span><span class="wl-code">${item.symbol}</span>`;
    const del = document.createElement('span');
    del.className = 'wl-del';
    del.textContent = '×';
    del.title = '删除';
    del.addEventListener('click', e => {
      e.stopPropagation();
      const newList = loadWatchlist().filter(i => i.symbol !== item.symbol);
      saveWatchlist(newList);
      // 如果删的是当前品种，切到第一个
      if (item.symbol === currentSymbol && newList.length > 0) {
        currentSymbol = newList[0].symbol;
        currentSymbolName = newList[0].name;
        viewInitialized = false;
        loadData();
      }
      renderWatchlist();
    });
    div.appendChild(nameEl);
    div.appendChild(del);
    div.addEventListener('click', () => {
      currentSymbol = item.symbol;
      currentSymbolName = item.name;
      viewInitialized = false;
      renderWatchlist();
      loadData();
    });
    container.appendChild(div);
  });
}

async function addToWatchlist(symbol, name) {
  symbol = symbol.toUpperCase().trim();
  if (!symbol) return;
  const list = loadWatchlist();
  if (list.find(i => i.symbol === symbol)) {
    // 已存在，直接切换
    currentSymbol = symbol;
    currentSymbolName = name || symbol;
    viewInitialized = false;
    renderWatchlist();
    loadData();
    return;
  }
  // 验证合约存在
  const btn = document.getElementById('wl-add-btn');
  btn.textContent = '…';
  btn.disabled = true;
  try {
    const res = await fetch(`/api/resolve?symbol=${encodeURIComponent(symbol)}`);
    const data = await res.json();
    if (data.error) { alert(data.error); return; }
    const finalName = name || data.name || symbol;
    list.push({ symbol, name: finalName });
    saveWatchlist(list);
    currentSymbol = symbol;
    currentSymbolName = finalName;
    viewInitialized = false;
    renderWatchlist();
    loadData();
  } catch(e) {
    alert('添加失败: ' + e.message);
  } finally {
    btn.textContent = '+ 添加';
    btn.disabled = false;
  }
}

        dropdown.innerHTML = '<div class="wl-drop-searching">无匹配品种</div>';

      }
      dropdown.innerHTML = '';
      items.forEach(it => {
        const d = document.createElement('div');
        d.className = 'wl-drop-item';
        d.innerHTML = `<span class="di-name">${it.name}</span><span class="di-meta">${it.prefix}××××</span>`;
        d.addEventListener('click', () => {
          // 把前缀填到"添加合约"输入框，让用户补全月份
          document.getElementById('wl-add-input').value = it.prefix;
          document.getElementById('wl-add-input').focus();
          searchInput.value = '';
          dropdown.classList.remove('open');
        });
        dropdown.appendChild(d);
      });
    } catch { dropdown.innerHTML = '<div class="wl-drop-searching">搜索失败</div>'; }
  }, 300);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.wl-search-wrap')) dropdown.classList.remove('open');
});

renderWatchlist();

document.getElementById('btn-refresh').addEventListener('click', () => {
  const btn = document.getElementById('btn-refresh');
  btn.style.animation = 'spin .8s linear';

document.getElementById('btn-fs').addEventListener('click', () => {

// ── 全自选扫描 ────────────────────────────────────────
// 记录每个品种上次通知的状态，避免重复弹
const _watchlistNotified = {};

async function scanAllWatchlist() {
  const list = loadWatchlist();
  for (const item of list) {
    // 当前已在图表显示的品种跳过（loadData('update') 已处理）
    if (item.symbol === currentSymbol) continue;
    try {
      const res = await fetch(`${API}?period=${currentPeriod}&symbol=${item.symbol}&name=${encodeURIComponent(item.name)}&mode=update`);
      const data = await res.json();
      if (data.error) continue;
      checkAndNotify(data, item.symbol);
    } catch(e) {}
  }
}

// ── 桌面通知 ─────────────────────────────────────────

function initNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function checkAndNotify(data) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const sig  = data.signals || {};
  const meta = data.meta    || {};
  const sym  = data.symbol;
  const time = meta.datetime || '';

  if (!_watchlistNotified[sym]) _watchlistNotified[sym] = {};
  const prev = _watchlistNotified[sym];

  if (sig['做多'] && !(prev.type === '做多' && prev.time === time)) {
    prev.type = '做多'; prev.time = time;
    new Notification(`▲ 做多信号 — ${data.name}`, {
      body: `${time.slice(0,16)}  收盘 ${meta.close?.toFixed(0)}  K=${meta.K?.toFixed(1)}`,
      tag:  `${sym}-long`,
    });
  }

  if (sig['离场'] && !(prev.type === '离场' && prev.time === time)) {
    prev.type = '离场'; prev.time = time;
    new Notification(`▼ 离场信号 — ${data.name}`, {
      body: `${time.slice(0,16)}  收盘 ${meta.close?.toFixed(0)}  K=${meta.K?.toFixed(1)}`,
      tag:  `${sym}-exit`,
    });
  }
}

// 定时刷新：当前品种增量更新图表 + 所有自选品种静默检测信号
setInterval(() => {
  loadData('update');
  scanAllWatchlist();
}, 60000);

// ── 导入公式模态框 ────────────────────────────────────
const modalEl  = document.getElementById('modal-import');
const fiError  = document.getElementById('fi-error');

function openImportModal() {
  modalEl.style.display = 'flex';
  document.getElementById('fi-name').focus();
}
function closeImportModal() {
  modalEl.style.display = 'none';
  fiError.style.display = 'none';
}

document.getElementById('btn-import').addEventListener('click', openImportModal);
document.getElementById('modal-close').addEventListener('click', closeImportModal);
document.getElementById('fi-cancel').addEventListener('click', closeImportModal);
modalEl.addEventListener('click', e => { if (e.target === modalEl) closeImportModal(); });

document.getElementById('fi-submit').addEventListener('click', async () => {
  const name   = document.getElementById('fi-name').value.trim();
  const source = document.getElementById('fi-source').value.trim();
  const panel  = document.getElementById('fi-panel').value;
  fiError.style.display = 'none';

  if (!name || !source) {
    fiError.textContent = '请填写指标名称和公式代码';
    fiError.style.display = 'block';
    return;
  }

  const btn = document.getElementById('fi-submit');
  btn.textContent = '解析中…';
  btn.disabled = true;

  try {
    const res  = await fetch('/api/import_formula', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, source, panel }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    closeImportModal();
    document.getElementById('fi-name').value   = '';
    document.getElementById('fi-source').value = '';
    // 拉取插件完整 meta 并立即渲染新副图
    const metaRes = await fetch('/api/indicators');
    const allMetas = await metaRes.json();
    const newMeta = allMetas.find(m => m.id === data.id);
    if (newMeta && newMeta.panel === 'sub' && allData) {
      addSubChart(newMeta, allData.indicator_series);
    } else if (newMeta && newMeta.panel === 'main') {
      // 主图插件：提示刷新（主图复杂，暂不动态加）
      if (confirm(`✓ 主图指标「${data.name}」已添加，刷新页面后生效？`)) location.reload();
    }
  } catch(e) {
    fiError.textContent = e.message;
    fiError.style.display = 'block';
  } finally {
    btn.textContent = '解析并添加';
    btn.disabled = false;
  }
});

// ── 启动 ─────────────────────────────────────────────
initCharts();
initRightAnchorZoom();
initNotifications();

// 加载已保存的副图插件（排除内置的 bsd_wang/main_signal）
const BUILTIN_IDS = new Set(['bsd_wang', 'main_signal']);
fetch('/api/indicators').then(r => r.json()).then(metas => {
  metas.filter(m => m.panel === 'sub' && !BUILTIN_IDS.has(m.id))
       .forEach(m => addSubChart(m, allData?.indicator_series));
}).catch(() => {});

loadData();
</script>
